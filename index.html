<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Breath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@200;300;400&family=Noto+Sans:wght@200;300&family=Noto+Sans+SC:wght@200;300&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

:root{
  --ink:#04080f;
  --deep:#060c18;
  --text:#e8eff8;
  --sub:rgba(232,239,248,0.60);
  --dim:rgba(232,239,248,0.32);
  --g1:#b8892a;
  --g2:#d4a84c;
  --g3:#f0cc78;
  --g4:#fae8b0;
  --g5:#fff5d8;
  --gold-grad:linear-gradient(135deg,#b8892a 0%,#e8c060 30%,#fff0b0 50%,#e8c060 70%,#b8892a 100%);
  --gold-text:linear-gradient(135deg,#c8981a 0%,#f0c840 25%,#fff8c0 50%,#f0c840 75%,#c8981a 100%);
  --surf:rgba(255,255,255,0.038);
  --surf2:rgba(255,255,255,0.07);
  --bord:rgba(212,168,76,0.16);
  --bord2:rgba(212,168,76,0.32);
  --r:24px;--rs:15px;
  --serif:'Cormorant Garamond',serif;
  --sans:'Noto Sans JP','Noto Sans SC','Noto Sans',sans-serif;
  --display:'Pinyon Script',cursive;
  /* zone */
  --za:rgba(13,107,154,0.38);
  --zb:rgba(8,60,110,0.22);
  --zc1:rgba(195,220,255,0.96);
  --zc2:rgba(90,170,230,0.88);
  --zc3:rgba(30,110,195,0.80);
  --ze1:rgba(150,195,242,0.92);
  --ze2:rgba(55,138,212,0.82);
  --ze3:rgba(15,82,162,0.75);
  --zg:rgba(90,170,230,0.28);
  --zr:rgba(120,195,230,0.22);
  --zarc1:#6ab8e0;--zarc2:#d4a84c;
  --zb1:#0b608c;--zb2:#073d5c;--zbsh:rgba(11,96,140,0.42);
  --zcard:rgba(4,16,36,0.68);--zbord:rgba(212,168,76,0.18);
}

html,body{height:100%;}
body{
  background:var(--ink);
  font-family:var(--sans);
  font-weight:300;
  color:var(--text);
  min-height:100vh;min-height:100dvh;
  display:flex;align-items:stretch;justify-content:center;
  overflow:hidden;
}

/* ═══════════════════════════════
   BACKGROUND — deep ocean with light shafts
═══════════════════════════════ */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden;}

/* Base gradient */
.bg-base{
  position:absolute;inset:0;
  background:
    radial-gradient(ellipse 140% 80% at 50% -15%,var(--za) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at -5% 90%,var(--zb) 0%,transparent 55%),
    radial-gradient(ellipse 60% 50% at 105% 95%,rgba(212,168,76,0.05) 0%,transparent 55%),
    linear-gradient(180deg,#04090f 0%,#060d1c 50%,#04080f 100%);
  transition:background 1.6s ease;
}

/* Gold shimmer particles */
.bg-shimmer{
  position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 8%  18%,rgba(240,200,80,0.55) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 8%, rgba(180,220,255,0.35) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 38% 28%,rgba(240,200,80,0.48) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 12%,rgba(180,220,255,0.30) 0%,transparent 100%),
    radial-gradient(1px 1px at 72% 22%,rgba(240,200,80,0.42) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 88% 15%,rgba(180,220,255,0.38) 0%,transparent 100%),
    radial-gradient(1px 1px at 15% 55%,rgba(240,200,80,0.30) 0%,transparent 100%),
    radial-gradient(1px 1px at 42% 68%,rgba(180,220,255,0.25) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 65% 75%,rgba(240,200,80,0.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 62%,rgba(180,220,255,0.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 28% 88%,rgba(240,200,80,0.25) 0%,transparent 100%),
    radial-gradient(1px 1px at 92% 82%,rgba(180,220,255,0.22) 0%,transparent 100%);
  animation:shimmer 8s ease-in-out infinite alternate;
}
@keyframes shimmer{
  0%{opacity:0.6;transform:translateY(0);}
  100%{opacity:1;transform:translateY(-4px);}
}

/* Light shaft */
.bg-shaft{
  position:absolute;
  top:-20%;left:35%;
  width:30%;height:120%;
  background:linear-gradient(180deg,rgba(212,168,76,0.06) 0%,rgba(212,168,76,0.02) 40%,transparent 100%);
  transform:rotate(-8deg);
  filter:blur(20px);
  animation:shaft 6s ease-in-out infinite alternate;
}
@keyframes shaft{
  0%{opacity:0.4;transform:rotate(-8deg) scaleX(1);}
  100%{opacity:0.8;transform:rotate(-6deg) scaleX(1.3);}
}

/* ═══════════════════════════════
   APP SHELL
═══════════════════════════════ */
.app{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;
  min-height:100dvh;
}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:max(env(safe-area-inset-top),16px) 22px 0;
  min-height:52px;flex-shrink:0;
}
.nav-area{display:flex;gap:8px;opacity:0;pointer-events:none;transition:opacity 0.4s;}
.nav-area.show{opacity:1;pointer-events:auto;}
.nav-btn{
  background:var(--surf2);border:1px solid var(--bord);
  color:var(--sub);padding:7px 16px;border-radius:99px;
  font-family:var(--sans);font-size:13px;font-weight:300;
  cursor:pointer;transition:all 0.22s;backdrop-filter:blur(12px);
}
.nav-btn:hover{background:rgba(212,168,76,0.12);color:var(--text);border-color:var(--bord2);}
.lang-row{
  display:flex;gap:2px;
  background:var(--surf);border:1px solid var(--bord);
  border-radius:99px;padding:3px;backdrop-filter:blur(14px);
}
.lb{
  background:none;border:none;color:var(--dim);
  font-size:11px;font-family:var(--sans);font-weight:300;
  padding:5px 10px;border-radius:99px;cursor:pointer;
  transition:all 0.22s;letter-spacing:0.05em;
}
.lb.on{background:rgba(212,168,76,0.20);color:var(--g4);}

/* Card */
.card{
  flex:1;display:flex;flex-direction:column;
  margin:10px 14px max(env(safe-area-inset-bottom),18px);
  background:var(--zcard);
  border:1px solid var(--zbord);
  border-radius:var(--r);
  backdrop-filter:blur(36px);-webkit-backdrop-filter:blur(36px);
  overflow:hidden;
  box-shadow:
    0 0 0 1px rgba(212,168,76,0.04),
    0 30px 90px rgba(0,0,0,0.60),
    inset 0 1px 0 rgba(212,168,76,0.14),
    inset 0 -1px 0 rgba(212,168,76,0.06);
  transition:background 1.6s ease,border-color 1.6s ease;
}
/* Gold line top */
.card::before{
  content:'';display:block;height:1px;flex-shrink:0;
  background:linear-gradient(90deg,
    transparent 0%,
    rgba(184,137,42,0.3) 10%,
    rgba(212,168,76,0.7) 30%,
    rgba(255,240,160,0.9) 50%,
    rgba(212,168,76,0.7) 70%,
    rgba(184,137,42,0.3) 90%,
    transparent 100%);
  transition:background 1.6s ease;
}

/* ═══════════════════════════════
   SCREENS
═══════════════════════════════ */
.screen{display:none;flex-direction:column;flex:1;padding:30px 26px 34px;}
.screen.active{display:flex;}

/* ═══════════════════════════════
   SCREEN 1 — HOME
═══════════════════════════════ */
#s1.active .s1-brand   {animation:goldReveal 1.2s cubic-bezier(0.22,1,0.36,1) 0.1s both;}
#s1.active .s1-tagline {animation:riseUp 0.9s cubic-bezier(0.22,1,0.36,1) 0.5s both;}
#s1.active .s1-p1      {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.75s both;}
#s1.active .s1-p2      {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.90s both;}
#s1.active .s1-p3      {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.05s both;}
#s1.active .s1-sound   {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.20s both;}
#s1.active .s1-btn     {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 1.40s both;}

@keyframes goldReveal{
  0%  {opacity:0;transform:translateY(20px);filter:brightness(0.3) blur(4px);}
  60% {filter:brightness(1.4) blur(0);}
  100%{opacity:1;transform:translateY(0);filter:brightness(1) blur(0);}
}
@keyframes riseUp{
  from{opacity:0;transform:translateY(22px);}
  to  {opacity:1;transform:translateY(0);}
}

/* Brand */
.s1-brand{
  font-family:var(--display);
  font-size:92px;line-height:1.05;
  background:var(--gold-text);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 20px rgba(212,168,76,0.45)) drop-shadow(0 0 8px rgba(255,240,140,0.30));
  letter-spacing:0.01em;
  margin-bottom:2px;
}

/* Tagline */
.s1-tagline{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:18px;
  background:var(--gold-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:0.08em;
  margin-bottom:28px;
}

/* Body lines */
.s1-lines{display:flex;flex-direction:column;gap:8px;}
.s1-p1,.s1-p2{font-size:16px;line-height:1.8;color:var(--sub);}
.s1-p3{font-size:16px;line-height:1.8;color:var(--text);}

.spacer{flex:1;min-height:10px;}

/* Sound */
.s1-sound{padding-top:20px;}
.sound-label{
  font-size:13px;letter-spacing:0.10em;
  background:var(--gold-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:12px;font-weight:300;
}
.sound-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.sb{
  background:var(--surf);border:1px solid var(--bord);
  border-radius:var(--rs);padding:14px 8px;
  cursor:pointer;text-align:center;
  transition:all 0.22s;font-family:var(--sans);
  position:relative;overflow:hidden;
}
.sb::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.04) 0%,transparent 60%);
  pointer-events:none;
}
.sb:hover{background:rgba(212,168,76,0.08);border-color:var(--bord2);}
.sb.on{
  background:rgba(212,168,76,0.12);border-color:var(--bord2);
  box-shadow:0 0 12px rgba(212,168,76,0.15),inset 0 1px 0 rgba(255,240,160,0.10);
}
.sh{display:block;font-size:16px;font-weight:400;color:var(--text);margin-bottom:4px;letter-spacing:0.02em;}
.sb.on .sh{
  background:var(--gold-text);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.ss{display:block;font-size:10px;color:var(--sub);letter-spacing:0.04em;}

/* Main button */
.btn{
  width:100%;padding:17px;border-radius:var(--rs);border:none;
  background:linear-gradient(135deg,var(--zb1) 0%,var(--zb2) 100%);
  color:var(--g4);font-family:var(--sans);font-size:16px;
  font-weight:300;letter-spacing:0.10em;cursor:pointer;
  margin-top:20px;
  box-shadow:0 4px 28px var(--zbsh),inset 0 1px 0 rgba(212,168,76,0.22);
  transition:transform 0.15s,box-shadow 0.22s,background 1.6s ease;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.07) 0%,transparent 55%);
  pointer-events:none;
}
.s1-btn{opacity:0;}
#s1.active .s1-btn{opacity:1;}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 36px var(--zbsh);}
.btn:active{transform:translateY(0);}

/* ═══════════════════════════════
   SCREEN 2 — MOOD
═══════════════════════════════ */
#s2.active .mood-head{animation:riseUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.05s both;}
#s2.active .mood-row:nth-child(1){animation:riseUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.15s both;}
#s2.active .mood-row:nth-child(2){animation:riseUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.23s both;}
#s2.active .mood-row:nth-child(3){animation:riseUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.31s both;}
#s2.active .mood-row:nth-child(4){animation:riseUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.39s both;}
#s2.active .mood-row:nth-child(5){animation:riseUp 0.65s cubic-bezier(0.22,1,0.36,1) 0.47s both;}

.mood-head{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:23px;text-align:center;
  background:var(--gold-grad);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:18px;letter-spacing:0.04em;
}
.mood-list{display:flex;flex-direction:column;gap:10px;flex:1;}
.mood-row{
  flex:1;display:flex;align-items:center;gap:20px;
  padding:0 22px;border-radius:var(--rs);
  background:var(--surf);border:1px solid var(--bord);
  cursor:pointer;position:relative;overflow:hidden;
  transition:background 0.22s,border-color 0.22s,transform 0.18s;
  min-height:56px;
}
.mood-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:2px;
  background:var(--gold-grad);opacity:0;transition:opacity 0.22s;
}
.mood-row:hover{background:var(--surf2);border-color:var(--bord2);transform:translateX(3px);}
.mood-row:hover::before{opacity:1;}
.mi{font-size:28px;flex-shrink:0;}
.me{font-size:28px;flex-shrink:0;}

/* ═══════════════════════════════
   SCREEN 3 — ACK
═══════════════════════════════ */
#s3.active .ack-badge{animation:goldReveal 0.9s cubic-bezier(0.22,1,0.36,1) 0.1s both;}
#s3.active .ack-line1{animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.45s both;}
#s3.active .ack-line2{animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.65s both;}
#s3.active .ack-btn  {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.85s both;}
.ack-badge,.ack-line1,.ack-line2,.ack-btn{opacity:0;}
#s3.active .ack-badge,
#s3.active .ack-line1,
#s3.active .ack-line2,
#s3.active .ack-btn{opacity:1;}

.ack-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:0;
}
.ack-badge{
  display:inline-flex;align-items:center;gap:10px;
  padding:10px 24px;border-radius:99px;
  background:rgba(212,168,76,0.10);border:1px solid rgba(212,168,76,0.28);
  font-size:22px;margin-bottom:32px;
  box-shadow:0 0 16px rgba(212,168,76,0.12);
}
.ack-line1,.ack-line2{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:26px;line-height:1.7;color:var(--text);
  display:block;
}

/* ═══════════════════════════════
   SCREEN 4 — BREATHING
═══════════════════════════════ */
#s4.active .session-chip{animation:riseUp 0.6s cubic-bezier(0.22,1,0.36,1) 0.1s both;}
#s4.active .ring-wrap  {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.2s both;}
.breath-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:0 20px;
}
.session-chip{
  font-size:10px;letter-spacing:0.20em;text-transform:uppercase;
  color:var(--dim);border:1px solid var(--bord);border-radius:99px;
  padding:6px 18px;margin-bottom:36px;display:flex;align-items:center;opacity:0;
}
#s4.active .session-chip{opacity:1;}

/* Ring */
.ring-wrap{position:relative;width:234px;height:234px;margin-bottom:36px;flex-shrink:0;opacity:0;}
#s4.active .ring-wrap{opacity:1;}
.ro{position:absolute;inset:0;border-radius:50%;border:1px solid var(--zr);transform-origin:center;}
.rm{position:absolute;inset:24px;border-radius:50%;border:1px solid rgba(120,195,230,0.07);transform-origin:center;}
.rg{
  position:absolute;inset:46px;border-radius:50%;
  background:radial-gradient(circle,var(--zg) 0%,transparent 70%);
  filter:blur(18px);transform-origin:center;
}
.rc{
  position:absolute;inset:46px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transform-origin:center;
  box-shadow:0 0 0 1px var(--zg),0 8px 44px var(--zg),inset 0 1px 0 rgba(255,255,255,0.38);
}
.rph{
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  color:rgba(4,8,15,0.72);font-weight:400;
}
.rcn{
  font-family:var(--serif);font-style:italic;
  font-size:46px;font-weight:300;color:rgba(4,8,15,0.82);
  line-height:1;margin-top:2px;min-height:50px;
}
.bnote{font-size:12px;color:var(--dim);letter-spacing:0.06em;text-align:center;min-height:18px;}

/* Arc */
.arc-w{position:absolute;inset:0;pointer-events:none;display:none;}
.arc-w.show{display:block;}
.asv{width:100%;height:100%;transform:rotate(-90deg);}
.abg{fill:none;stroke:rgba(212,168,76,0.08);stroke-width:1.5;}
.apr{
  fill:none;stroke:url(#ag);stroke-width:1.5;stroke-linecap:round;
  stroke-dasharray:670;stroke-dashoffset:670;
  transition:stroke-dashoffset 0.95s linear;
}

/* ═══════════════════════════════
   SCREEN 4b — TRANSITION
═══════════════════════════════ */
#s4b.active .tb-p1{animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.15s both;}
#s4b.active .tb-p2{animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.40s both;}
#s4b.active .tb-btn{animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.60s both;}
.tb-p1,.tb-p2,.tb-btn{opacity:0;}
#s4b.active .tb-p1,#s4b.active .tb-p2,#s4b.active .tb-btn{opacity:1;}
.trans-body{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:18px;
}
.tb-p1{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:24px;line-height:1.9;color:var(--text);
}
.tb-p2{font-size:15px;color:var(--sub);line-height:1.8;}

/* ═══════════════════════════════
   SCREEN 5 — FINISH
═══════════════════════════════ */
#s5.active .fin-mark{animation:goldReveal 1.0s cubic-bezier(0.22,1,0.36,1) 0.1s both;}
#s5.active .fin-l1  {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.55s both;}
#s5.active .fin-l2  {animation:riseUp 0.8s cubic-bezier(0.22,1,0.36,1) 0.75s both;}
#s5.active .fin-note{animation:riseUp 0.7s cubic-bezier(0.22,1,0.36,1) 0.95s both;}
#s5.active .fin-btn {animation:riseUp 0.7s cubic-bezier(0.22,1,0.36,1) 1.10s both;}
.fin-mark,.fin-l1,.fin-l2,.fin-note,.fin-btn{opacity:0;}
#s5.active .fin-mark,#s5.active .fin-l1,#s5.active .fin-l2,
#s5.active .fin-note,#s5.active .fin-btn{opacity:1;}

.fin-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fin-mark{
  font-family:var(--display);font-size:64px;
  background:var(--gold-text);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 2px 12px rgba(212,168,76,0.40));
  margin-bottom:28px;line-height:1;
}
.fin-l1,.fin-l2{
  font-family:var(--serif);font-style:italic;font-weight:300;
  font-size:24px;line-height:1.9;color:var(--text);display:block;
}
.fin-note{font-size:13px;color:var(--dim);margin-top:18px;letter-spacing:0.10em;}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-base" id="bgBase"></div>
  <div class="bg-shimmer"></div>
  <div class="bg-shaft"></div>
</div>

<div class="app">
  <div class="topbar">
    <div class="nav-area" id="navArea">
      <button class="nav-btn" onclick="goBack()">← 戻る</button>

<script>

const ZT={

  fog:{

    e1:'rgba(228,210,175,0.92)',e2:'rgba(190,170,128,0.82)',e3:'rgba(150,130,90,0.75)',
    g:'rgba(208,188,148,0.28)',r:'rgba(198,178,138,0.24)',
    a1:'#c8b078',a2:'#e0cc9a',b1:'#483818',b2:'#605028',bsh:'rgba(160,132,48,0.42)',
    card:'rgba(7,5,14,0.78)',bord:'rgba(198,178,122,0.26)',

};

function applyTheme(z){
  const th=z?ZT[z]:null;
  const R=document.documentElement;
  const D={
    '--za':'rgba(13,107,154,0.38)','--zb':'rgba(8,60,110,0.22)',
    '--zc1':'rgba(195,220,255,0.96)','--zc2':'rgba(90,170,230,0.88)','--zc3':'rgba(30,110,195,0.80)',
    '--ze1':'rgba(150,195,242,0.92)','--ze2':'rgba(55,138,212,0.82)','--ze3':'rgba(15,82,162,0.75)',
    '--zg':'rgba(90,170,230,0.28)','--zr':'rgba(120,195,230,0.22)',
    '--zarc1':'#6ab8e0','--zarc2':'#d4a84c',
    '--zb1':'#0b608c','--zb2':'#073d5c','--zbsh':'rgba(11,96,140,0.42)',
    '--zcard':'rgba(4,16,36,0.68)','--zbord':'rgba(212,168,76,0.18)',
  };
  const M=th?{
    '--za':th.za,'--zb':th.zb,
    '--zc1':th.c1,'--zc2':th.c2,'--zc3':th.c3,
    '--ze1':th.e1,'--ze2':th.e2,'--ze3':th.e3,
    '--zg':th.g,'--zr':th.r,
    '--zarc1':th.a1,'--zarc2':th.a2,
    '--zb1':th.b1,'--zb2':th.b2,'--zbsh':th.bsh,
    '--zcard':th.card,'--zbord':th.bord,
  }:D;
  for(const[k,v]of Object.entries(M))R.style.setProperty(k,v);
  if(th){
    document.getElementById('ag1').setAttribute('stop-color',th.a1);
    document.getElementById('ag2').setAttribute('stop-color',th.a2);
  }
  /* Update bg */
  document.getElementById('bgBase').style.background=
    `radial-gradient(ellipse 140% 80% at 50% -15%,${th?th.za:'rgba(13,107,154,0.38)'} 0%,transparent 55%),`+
    `radial-gradient(ellipse 80% 60% at -5% 90%,${th?th.zb:'rgba(8,60,110,0.22)'} 0%,transparent 55%),`+
    `radial-gradient(ellipse 60% 50% at 105% 95%,rgba(212,168,76,0.05) 0%,transparent 55%),`+
    `linear-gradient(180deg,#04090f 0%,#060d1c 50%,#04080f 100%)`;
}

/* i18n */
const L={
  ja:{home:'ホーム',tagline:'今すぐ幸せになる',
    s1p1:'感情は、一気に変えることはできません',s1p2:'でも、少しずつなら動かせます',
    s1p3:'呼吸を、少しだけ観察してみましょう',s1btn:'今の気分をチェックする',
    soundLabel:'秒針音',hz432:'自然な共鳴',hz528:'修復・癒し',hz963:'意識の覚醒',
    s2title:'今の気分に近いもの',
    s3p1:'今の気分に気づけただけで、',s3p2:'十分です',s3btn:'つづける',
    guide1m:'通常の呼吸　1分',guide90:'吐くだけ　90秒',phIn:'吸う',phOut:'吐く',
    transP1:'次は、吐くことだけに<br>任せてみます',transP2:'肺の空気が、自然に出ていきます',transbtn:'つづける',
    finP1:'それで十分です',finP2:'あなたは今、少し上にいます',finNote:'また、いつでも',finBtn:'もう一度'},
  en:{home:'Home',tagline:'Feel better, right now',
    s1p1:"Emotions can't change all at once.",s1p2:'But they can shift, little by little.',
    s1p3:'Observe your breath for a moment.',s1btn:'Check how you feel',
    soundLabel:'Tone',hz432:'Natural resonance',hz528:'Repair & healing',hz963:'Awakening',
    s2title:'Which feels closest to now?',
    s3p1:'Just noticing how you feel',s3p2:'is enough.',s3btn:'Continue',
    guide1m:'Breathing · 1 min',guide90:'Exhale only · 90 sec',phIn:'Inhale',phOut:'Exhale',
    transP1:"Now, let's just<br>exhale.",transP2:'Let the air find its own way out.',transbtn:'Continue',
    finP1:'That was enough.',finP2:"You're a little higher now.",finNote:'Come back anytime.',finBtn:'Again'},
  zh:{home:'主页',tagline:'立刻，感到幸福',
    s1p1:'情绪无法一下子改变，',s1p2:'但可以慢慢移动。',s1p3:'试着观察一下呼吸吧。',
    s1btn:'确认现在的心情',soundLabel:'节拍音',hz432:'自然共鸣',hz528:'修复与疗愈',hz963:'意识觉醒',
    s2title:'最接近你现在心情的是？',s3p1:'能意识到自己的心情，',s3p2:'就已经足够了。',s3btn:'继续',
    guide1m:'呼吸练习　1分钟',guide90:'仅呼气　90秒',phIn:'吸气',phOut:'呼气',
    transP1:'接下来，把一切<br>交给呼气。',transP2:'让空气自然地流出。',transbtn:'继续',
    finP1:'这就足够了。',finP2:'你现在，比刚才好一点点。',finNote:'随时都可以回来。',finBtn:'再来一次'},
  es:{home:'Inicio',tagline:'Siente bienestar, ahora',
    s1p1:'Las emociones no cambian de golpe.',s1p2:'Pero pueden moverse, poco a poco.',
    s1p3:'Observa tu respiración un momento.',s1btn:'Ver cómo me siento',
    soundLabel:'Sonido',hz432:'Resonancia natural',hz528:'Reparación y alivio',hz963:'Despertar',
    s2title:'¿Cuál se acerca más a ahora?',s3p1:'Solo notar cómo te sientes',s3p2:'ya es suficiente.',s3btn:'Continuar',
    guide1m:'Respiración · 1 min',guide90:'Solo exhalar · 90 seg',phIn:'Inhala',phOut:'Exhala',
    transP1:'Ahora, solo<br>exhala.',transP2:'Deja que el aire salga solo.',transbtn:'Continuar',
    finP1:'Eso fue suficiente.',finP2:'Estás un poco mejor ahora.',finNote:'Vuelve cuando quieras.',finBtn:'Otra vez'},
};
let lang='ja';
const t=k=>L[lang][k]||L.ja[k]||k;
function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===({ja:'JP',en:'EN',zh:'中',es:'ES'}[l])));
  applyTrans();
  document.documentElement.lang=l==='zh'?'zh-Hans':l;
}
function applyTrans(){
  document.querySelectorAll('[data-i]').forEach(el=>{
    const v=t(el.getAttribute('data-i'));
    if(v.includes('<br>'))el.innerHTML=v;else el.textContent=v;
  });
  if(curPhase!==null)document.getElementById('rphEl').textContent=t(curPhase?'phIn':'phOut');
}

/* STATE */
let zone='',hist=[1],rafId=null,actx=null,freq=528,curPhase=null;
const ZE={sun:'🌞 😊',cloud:'☁️ 😑',rain:'🌧️ 😓',storm:'⛈️ 😡',fog:'🌫️ 🥶'};

/* NAV */
function next(n){
  cancelRaf();
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  hist.push(n);
  document.getElementById('navArea').classList.toggle('show',n!=1);
}
function goHome(){cancelRaf();hist=[1];applyTheme(null);next(1);}
function goBack(){
  cancelRaf();
  if(hist.length>1){hist.pop();const p=hist[hist.length-1]||1;hist.pop();if(p==1)applyTheme(null);next(p);}
}

/* ZONE */
function pickZone(z){
  zone=z;applyTheme(z);
  document.getElementById('zoneBadge').textContent=ZE[z];
  next(3);
}

/* SOUND */
function pickSound(f,btn){
  freq=f;
  document.querySelectorAll('.sb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  preview(f);
}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function preview(f){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.06,c.currentTime+0.05);g.gain.linearRampToValueAtTime(0,c.currentTime+0.55);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.6);}catch(e){}}
function tick(){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.24,c.currentTime+0.03);g.gain.linearRampToValueAtTime(0,c.currentTime+0.15);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.18);}catch(e){}}

/* ENGINE */
const IN=3000,EX=5000,CYC=8000,SES=60000,ARC=668;
function cancelRaf(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function startBreath(){
  next(4);showRings(true);
  document.getElementById('arcW').classList.remove('show');
  document.getElementById('schip').textContent=t('guide1m');
  document.getElementById('bnoteEl').textContent='';
  const start=performance.now();let ls=-1;
  function f(){
    const el=performance.now()-start;
    if(el>=SES){if(zone==='storm'||zone==='fog')next('4b');else next(5);return;}
    const pos=el%CYC,isIn=pos<IN;curPhase=isIn;
    let sc,disp;
    if(isIn){const tt=pos/IN;sc=1+0.26*ease(tt);disp=Math.min(3,Math.floor(tt*3)+1);}
    else{const tt=(pos-IN)/EX;sc=1.26-0.38*ease(tt);disp=Math.min(5,Math.floor(tt*5)+1);}
    drawC(sc,isIn);
    document.getElementById('rphEl').textContent=t(isIn?'phIn':'phOut');
    document.getElementById('rcnEl').textContent=disp;
    const s=Math.floor(el/1000);if(s!==ls){ls=s;tick();}
    rafId=requestAnimationFrame(f);
  }
  rafId=requestAnimationFrame(f);
}

function startExhale(){
  next(4);showRings(false);
  document.getElementById('arcW').classList.add('show');
  document.getElementById('aprEl').style.strokeDashoffset=ARC;
  document.getElementById('schip').textContent=t('guide90');
  curPhase=false;
  const ES=90000,start=performance.now();let ls=-1;
  function f(){
    const el=performance.now()-start;
    if(el>=ES){document.getElementById('aprEl').style.strokeDashoffset=0;next(5);return;}
    document.getElementById('aprEl').style.strokeDashoffset=ARC*(1-el/ES);
    document.getElementById('rcnEl').textContent=Math.ceil((ES-el)/1000);
    document.getElementById('rphEl').textContent=t('phOut');
    drawC(0.72+Math.sin((el/5000)*Math.PI)*0.05,false);
    const s=Math.floor(el/1000);if(s!==ls){ls=s;tick();}
    rafId=requestAnimationFrame(f);
  }
  rafId=requestAnimationFrame(f);
}

function showRings(v){
  document.getElementById('roEl').style.display=v?'':'none';
  document.getElementById('rmEl').style.display=v?'':'none';
}
function drawC(s,isIn){
  const rc=document.getElementById('rcEl');
  const ro=document.getElementById('roEl');
  const rm=document.getElementById('rmEl');
  const rg=document.getElementById('rgEl');
  rc.style.transform=`scale(${s.toFixed(4)})`;
  if(ro)ro.style.transform=`scale(${(0.82+s*0.20).toFixed(4)})`;
  if(rm)rm.style.transform=`scale(${(0.86+s*0.16).toFixed(4)})`;
  if(rg){rg.style.transform=`scale(${(s*1.3).toFixed(4)})`;rg.style.opacity=(0.4+s*0.35).toFixed(3);}
  const g=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();
  const c1=isIn?'--zc1':'--ze1',c2=isIn?'--zc2':'--ze2',c3=isIn?'--zc3':'--ze3';
  rc.style.background=`radial-gradient(circle at 35% 30%,${g(c1)},${g(c2)},${g(c3)})`;
  rc.style.boxShadow=`0 0 0 1px ${g('--zg')},0 8px 44px ${g('--zg')},inset 0 1px 0 rgba(255,255,255,0.38)`;
}
</script>
