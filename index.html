<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Breath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Noto+Sans+JP:wght@200;300;400&family=Noto+Sans:wght@200;300&family=Noto+Sans+SC:wght@200;300&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #100a06;
  --surface:  rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.07);
  --border:   rgba(255,200,150,0.12);
  --border2:  rgba(255,200,150,0.22);
  --text:     #f5ede6;
  --sub:      rgba(245,237,230,0.55);
  --dim:      rgba(245,237,230,0.28);
  --accent:   #ff9966;
  --accent2:  #ffb347;
  --r:  24px;
  --rs: 14px;
  --font-serif: 'Playfair Display', serif;
  --font-sans:  'Noto Sans JP', 'Noto Sans SC', 'Noto Sans', sans-serif;

  /* Zone theme vars — overridden per zone */
  --z-bg1:    rgba(255,153,102,0.28);
  --z-bg2:    rgba(255,179,71,0.10);
  --z-bg3:    rgba(232,131,122,0.10);
  --z-cin1:   rgba(255,215,160,0.97);
  --z-cin2:   rgba(255,140,70,0.88);
  --z-cin3:   rgba(220,100,55,0.80);
  --z-cout1:  rgba(255,180,120,0.92);
  --z-cout2:  rgba(210,100,70,0.82);
  --z-cout3:  rgba(180,70,50,0.75);
  --z-glow:   rgba(255,140,60,0.28);
  --z-ring:   rgba(255,153,102,0.18);
  --z-arc1:   #ff9966;
  --z-arc2:   #ffcb8a;
  --z-btn1:   #ff9966;
  --z-btn2:   #ffb347;
  --z-bshadow:rgba(255,153,102,0.30);
  --z-border: rgba(255,200,150,0.12);
  --z-pill-bg:rgba(255,153,102,0.08);
  --z-pill-bd:rgba(255,153,102,0.20);
  --z-pill-c: #ff9966;
}

html, body { height: 100%; margin: 0; padding: 0; }

body {
  background: var(--bg);
  font-family: var(--font-sans);
  font-weight: 300;
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  display: flex;
  align-items: stretch;
  justify-content: center;
  overflow-x: hidden;
}

/* ── Background ── */
.bg-layer { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
.bg-layer::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 100% 60% at 50% -10%, var(--z-bg1) 0%, transparent 55%),
    radial-gradient(ellipse 60%  40% at 90%  50%, var(--z-bg2) 0%, transparent 50%),
    radial-gradient(ellipse 50%  50% at 10%  90%, var(--z-bg3) 0%, transparent 55%);
  transition: background 1.2s ease;
}
.bg-layer::after {
  content: '';
  position: absolute; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  background-size: 256px; opacity: 0.55;
}

/* ── App ── */
.app { position: relative; z-index: 1; width: 100%; max-width: 480px; display: flex; flex-direction: column; }

/* ── Topbar ── */
.topbar {
  display: flex; justify-content: flex-start; align-items: center;
  padding: 12px 20px 0; margin-bottom: 0; min-height: 48px;
}
.nav-area { display: flex; gap: 8px; opacity: 0; pointer-events: none; transition: opacity 0.35s; }
.nav-area.show { opacity: 1; pointer-events: auto; }
.nav-btn {
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--sub); padding: 7px 15px; border-radius: 99px;
  font-family: inherit; font-size: 12px; font-weight: 300;
  cursor: pointer; transition: background 0.2s, color 0.2s; backdrop-filter: blur(10px);
}
.nav-btn:hover { background: rgba(255,255,255,0.10); color: var(--text); }

/* ── Lang switcher ── */
.lang-switcher {
  display: flex; gap: 2px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 99px; padding: 4px; backdrop-filter: blur(10px);
}
.lang-btn {
  background: none; border: none; color: var(--dim);
  font-size: 11px; font-family: inherit; font-weight: 300;
  padding: 4px 9px; border-radius: 99px; cursor: pointer;
  transition: background 0.2s, color 0.2s; letter-spacing: 0.04em;
}
.lang-btn.active { background: var(--surface2); color: var(--text); }

/* ── Card ── */
.card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--z-border);
  border-radius: 0;
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  overflow: hidden;
  box-shadow: none;
  flex: 1;
  display: flex;
  flex-direction: column;
  transition: border-color 1.2s ease;
}
.card::before {
  content: ''; display: block; height: 2px;
  background: linear-gradient(90deg,
    transparent 0%, var(--z-arc1) 30%, var(--z-arc2) 50%, var(--z-arc1) 70%, transparent 100%);
  transition: background 1.2s ease;
}

/* ── Screens ── */
.screen { display: none; flex-direction: column; flex: 1; padding: 24px 28px 40px; }
.screen.active { display: flex; animation: revealUp 0.5s cubic-bezier(0.22,1,0.36,1) both; }
@keyframes revealUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Title ── */
.title-serif {
  font-family: var(--font-serif); font-style: italic; font-weight: 400;
  font-size: 72px; letter-spacing: -0.02em; line-height: 1; margin-bottom: 6px;
  background: linear-gradient(135deg, #ff9966 0%, #ffcb8a 50%, #ff9966 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}

.tagline {
  font-size: 13px; letter-spacing: 0.14em;
  color: #f5c07a; margin-bottom: 28px; font-weight: 300;
}

.body-text { font-size: 15px; line-height: 2; color: var(--text); }
.body-text .dim { color: var(--sub); }
.spacer { flex: 1; min-height: 12px; }

/* ── Button ── */
.btn {
  width: 100%; padding: 16px; border-radius: var(--rs); border: none;
  background: linear-gradient(135deg, var(--z-btn1) 0%, var(--z-btn2) 100%);
  color: #1a0f0a; font-family: inherit; font-size: 14px; font-weight: 400;
  letter-spacing: 0.08em; cursor: pointer; margin-top: 20px;
  box-shadow: 0 4px 24px var(--z-bshadow), 0 1px 0 rgba(255,255,255,0.15) inset;
  transition: transform 0.15s, box-shadow 0.2s, background 1.2s ease;
  position: relative; overflow: hidden;
}
.btn::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 50%);
  pointer-events: none;
}
.btn:hover  { transform: translateY(-2px); box-shadow: 0 8px 32px var(--z-bshadow); }
.btn:active { transform: translateY(0); }

/* ── Sound selector ── */
.sound-section { margin-top: 22px; }
.sound-label {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--sub); margin-bottom: 10px;
}
.sound-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.sound-btn {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--sub); padding: 12px 10px; border-radius: var(--rs);
  font-family: inherit; font-size: 11px; font-weight: 300;
  cursor: pointer; transition: all 0.2s; text-align: center; line-height: 1.5;
}
.sound-btn .hz { font-size: 13px; color: var(--text); display: block; margin-bottom: 3px; font-weight: 400; }
.sound-btn .hz-sub { font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
.sound-btn.active {
  background: rgba(255,153,102,0.12); border-color: rgba(255,153,102,0.35); color: var(--text);
}
.sound-btn.active .hz { color: var(--accent); }

/* ── Mood list ── */
.mood-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
.mood-item {
  display: flex; align-items: center; gap: 16px;
  padding: 15px 18px; border-radius: var(--rs);
  background: var(--surface); border: 1px solid var(--border);
  cursor: pointer; transition: background 0.22s, border-color 0.22s, transform 0.18s;
  position: relative; overflow: hidden;
}
.mood-item::before {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
  background: linear-gradient(180deg, var(--accent), var(--accent2));
  opacity: 0; transition: opacity 0.2s;
}
.mood-item:hover { background: var(--surface2); border-color: var(--border2); transform: translateX(4px); }
.mood-item:hover::before { opacity: 1; }
.mood-icon  { font-size: 22px; width: 28px; text-align: center; flex-shrink: 0; }
.mood-emotion { font-size: 22px; }

/* ── Zone pill ── */
.zone-pill {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 5px 14px; border-radius: 99px;
  background: var(--z-pill-bg); border: 1px solid var(--z-pill-bd);
  font-size: 12px; color: var(--z-pill-c); letter-spacing: 0.06em;
  margin-bottom: 20px; transition: all 1.2s ease;
}

/* ── Breathing screen ── */
.breath-screen {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 24px 28px;
}
.guide-chip {
  font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--dim); border: 1px solid var(--border); border-radius: 99px;
  padding: 5px 14px; margin-bottom: 32px; min-height: 26px;
  display: flex; align-items: center;
}

/* ── Ring ── */
.ring-wrap { position: relative; width: 220px; height: 220px; margin-bottom: 32px; flex-shrink: 0; }
.ring-outer {
  position: absolute; inset: 0; border-radius: 50%;
  border: 1px solid var(--z-ring); transform-origin: center;
}
.ring-mid {
  position: absolute; inset: 22px; border-radius: 50%;
  border: 1px solid rgba(255,153,102,0.08); transform-origin: center;
}
.ring-glow {
  position: absolute; inset: 44px; border-radius: 50%;
  background: radial-gradient(circle, var(--z-ring) 0%, transparent 70%);
  filter: blur(14px); transform-origin: center;
}
.circle-core {
  position: absolute; inset: 44px; border-radius: 50%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transform-origin: center;
}
.phase-text {
  font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;
  color: rgba(26,15,10,0.72); font-weight: 400;
}
.count-num {
  font-family: var(--font-serif); font-style: italic; font-size: 38px; font-weight: 400;
  color: rgba(26,15,10,0.82); line-height: 1; margin-top: 2px; min-height: 42px;
}

/* Arc */
.arc-svg-wrap { position: absolute; inset: 0; pointer-events: none; display: none; }
.arc-svg-wrap.show { display: block; }
.arc-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.arc-bg   { fill: none; stroke: rgba(255,153,102,0.08); stroke-width: 1.5; }
.arc-prog {
  fill: none; stroke: url(#aGrad); stroke-width: 1.5; stroke-linecap: round;
  stroke-dasharray: 629; stroke-dashoffset: 629;
  transition: stroke-dashoffset 0.95s linear;
}
.breath-hint { font-size: 12px; color: var(--dim); letter-spacing: 0.08em; text-align: center; min-height: 18px; }

/* ── Transition ── */
.trans-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center; gap: 16px;
}
.trans-content p { font-size: 16px; line-height: 2; color: var(--text); }
.trans-content .dim { font-size: 13px; color: var(--sub); }

/* ── Finish ── */
.finish-content {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; text-align: center;
}
.finish-mark { font-size: 13px; letter-spacing: 0.3em; color: var(--dim); margin-bottom: 28px; }
.finish-text { font-size: 16px; line-height: 2.1; color: var(--text); }
.finish-note { font-size: 12px; color: var(--dim); margin-top: 14px; letter-spacing: 0.08em; }

/* ── Divider ── */
.divider {
  width: 32px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--border2), transparent);
  margin: 18px auto;
}
</style>
</head>
<body>
<div class="bg-layer" id="bgLayer"></div>

<div class="app">
  <div class="topbar">
    <div class="nav-area" id="navArea">
      <button class="nav-btn" onclick="goBack()">←</button>
      <button class="nav-btn" onclick="goHome()" data-i18n="home">ホーム</button>
    </div>
  </div>

  <div class="card" id="card">

    <!-- S1: Welcome -->
    <div id="s1" class="screen active">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;">
        <div class="title-serif">Breath</div>
        <div class="lang-switcher" style="margin-top:10px;flex-shrink:0;">
          <button class="lang-btn active" onclick="setLang('ja')">JP</button>
          <button class="lang-btn"        onclick="setLang('en')">EN</button>
          <button class="lang-btn"        onclick="setLang('zh')">中</button>
          <button class="lang-btn"        onclick="setLang('es')">ES</button>
        </div>
      </div>
      <div class="tagline" data-i18n="tagline">今すぐ、幸せになる</div>
      <div class="body-text">
        <p class="dim" data-i18n="s1p1">感情は、一気に変えることはできません</p>
        <br>
        <p class="dim" data-i18n="s1p2">でも、少しずつなら動かせます</p>
        <br>
        <p data-i18n="s1p3">呼吸を、少しだけ観察してみましょう</p>
      </div>
      <div class="sound-section">
        <div class="sound-label" data-i18n="soundLabel">音を選ぶ</div>
        <div class="sound-grid">
          <button class="sound-btn" onclick="selectSound(432,this)">
            <span class="hz">432 Hz</span>
            <span class="hz-sub" data-i18n="hz432">自然な共鳴</span>
          </button>
          <button class="sound-btn active" onclick="selectSound(528,this)">
            <span class="hz">528 Hz</span>
            <span class="hz-sub" data-i18n="hz528">修復・癒し</span>
          </button>
          <button class="sound-btn" onclick="selectSound(963,this)">
            <span class="hz">963 Hz</span>
            <span class="hz-sub" data-i18n="hz963">意識の覚醒</span>
          </button>
        </div>
      </div>
      <div class="spacer"></div>
      <button class="btn" onclick="next(2)" data-i18n="s1btn">今の気分をチェックする</button>
    </div>

    <!-- S2: Mood -->
    <div id="s2" class="screen">
      <p data-i18n="s2title">今の気分に近いもの</p>
      <div class="mood-list">
        <div class="mood-item" onclick="selectZone('sun')">
          <span class="mood-icon">🌞</span><span class="mood-emotion">😊</span>
        </div>
        <div class="mood-item" onclick="selectZone('cloud')">
          <span class="mood-icon">☁️</span><span class="mood-emotion">😑</span>
        </div>
        <div class="mood-item" onclick="selectZone('rain')">
          <span class="mood-icon">🌧️</span><span class="mood-emotion">😓</span>
        </div>
        <div class="mood-item" onclick="selectZone('storm')">
          <span class="mood-icon">⛈️</span><span class="mood-emotion">😡</span>
        </div>
        <div class="mood-item" onclick="selectZone('fog')">
          <span class="mood-icon">🌫️</span><span class="mood-emotion">🥶</span>
        </div>
      </div>
    </div>

    <!-- S3: Ack -->
    <div id="s3" class="screen">
      <div id="zonePill"></div>
      <p data-i18n="s3p1">今の気分に気づけただけで、</p>
      <p data-i18n="s3p2">十分です</p>
      <div class="spacer"></div>
      <button class="btn" onclick="startBreathing()" data-i18n="s3btn">つづける</button>
    </div>

    <!-- S4: Breathing -->
    <div id="s4" class="screen" style="padding:0">
      <div class="breath-screen">
        <div class="guide-chip" id="guideChip" data-i18n="guide1min">通常の呼吸　1分</div>
        <div class="ring-wrap">
          <div class="arc-svg-wrap" id="arcWrap">
            <svg class="arc-svg" viewBox="0 0 220 220">
              <defs>
                <linearGradient id="aGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%"   stop-color="#ff9966" id="arcStop1"/>
                  <stop offset="100%" stop-color="#ffcb8a" id="arcStop2"/>
                </linearGradient>
              </defs>
              <circle class="arc-bg"   cx="110" cy="110" r="100"/>
              <circle class="arc-prog" id="arcProg" cx="110" cy="110" r="100"/>
            </svg>
          </div>
          <div class="ring-outer"  id="ringOuter"></div>
          <div class="ring-mid"    id="ringMid"></div>
          <div class="ring-glow"   id="ringGlow"></div>
          <div class="circle-core" id="circleCore">
            <div class="phase-text" id="phaseText">吸う</div>
            <div class="count-num"  id="countNum">1</div>
          </div>
        </div>
        <div class="breath-hint" id="breathHint"></div>
      </div>
    </div>

    <!-- S4b: Transition -->
    <div id="s4b" class="screen">
      <div class="trans-content">
        <p data-i18n="transP1">次は、吐くことだけに<br>任せてみます</p>
        <p class="dim" data-i18n="transP2">肺の空気が、自然に出ていきます</p>
      </div>
      <button class="btn" onclick="startExhale()" data-i18n="transbtn">つづける</button>
    </div>

    <!-- S5: Finish -->
    <div id="s5" class="screen">
      <div class="finish-content">
        <div class="finish-mark">· · ·</div>
        <div class="finish-text">
          <span data-i18n="finP1">それで十分です</span><br><br>
          <span data-i18n="finP2">あなたは今、少し上にいます</span>
        </div>
        <div class="finish-note" data-i18n="finNote">また、いつでも</div>
      </div>
      <button class="btn" onclick="next(1)" data-i18n="finBtn">もう一度</button>
    </div>

  </div><!-- /card -->
</div><!-- /app -->

<script>
/* ═══════════════════════════════
   ZONE THEMES
═══════════════════════════════ */
const ZONE_THEMES = {
  sun: {
    bg1:'rgba(135,206,250,0.30)', bg2:'rgba(255,215,80,0.16)', bg3:'rgba(255,180,60,0.10)',
    cin1:'rgba(255,240,160,0.98)', cin2:'rgba(255,210,60,0.90)', cin3:'rgba(240,170,30,0.82)',
    cout1:'rgba(255,230,120,0.92)', cout2:'rgba(240,190,40,0.82)', cout3:'rgba(210,150,20,0.75)',
    glow:'rgba(255,215,60,0.28)', ring:'rgba(255,215,80,0.20)',
    arc1:'#ffe066', arc2:'#ffd700',
    btn1:'#f5c020', btn2:'#ffd740', bshadow:'rgba(240,200,30,0.35)',
    border:'rgba(255,220,100,0.18)', pillBg:'rgba(255,215,60,0.10)',
    pillBd:'rgba(255,215,60,0.25)', pillC:'#f5c020',
  },
  cloud: {
    bg1:'rgba(160,185,210,0.25)', bg2:'rgba(180,200,220,0.12)', bg3:'rgba(140,160,180,0.10)',
    cin1:'rgba(220,232,245,0.95)', cin2:'rgba(180,200,220,0.88)', cin3:'rgba(140,165,190,0.80)',
    cout1:'rgba(200,215,232,0.90)', cout2:'rgba(160,180,205,0.80)', cout3:'rgba(120,145,170,0.72)',
    glow:'rgba(180,200,220,0.22)', ring:'rgba(180,200,220,0.18)',
    arc1:'#a0bcd8', arc2:'#c8dcea',
    btn1:'#7a9ab8', btn2:'#96b4cc', bshadow:'rgba(120,160,200,0.30)',
    border:'rgba(180,200,220,0.18)', pillBg:'rgba(160,185,210,0.10)',
    pillBd:'rgba(160,185,210,0.25)', pillC:'#96b4cc',
  },
  rain: {
    bg1:'rgba(40,80,140,0.35)', bg2:'rgba(60,100,160,0.18)', bg3:'rgba(80,120,170,0.12)',
    cin1:'rgba(160,200,240,0.95)', cin2:'rgba(80,140,210,0.88)', cin3:'rgba(40,100,180,0.80)',

    btn1:'#3a78c0', btn2:'#5090d8', bshadow:'rgba(50,120,200,0.35)',
    border:'rgba(80,140,210,0.18)', pillBg:'rgba(60,110,180,0.12)',
    pillBd:'rgba(80,140,210,0.28)', pillC:'#78b0e0',
  },
  storm: {

function t(k){ return LANGS[lang][k] || LANGS.ja[k] || k; }

function setLang(l) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.trim() === ({ja:'JP',en:'EN',zh:'中',es:'ES'}[l]));
  });
  applyTranslations();
  document.documentElement.lang = l === 'zh' ? 'zh-Hans' : l;
}

function applyTranslations() {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const v = t(el.getAttribute('data-i18n'));
    if (v.includes('<br>')) el.innerHTML = v; else el.textContent = v;
  });
  if (currentPhase !== null)
    document.getElementById('phaseText').textContent = t(currentPhase ? 'phaseIn' : 'phaseOut');
}

═══════════════════════════════ */
function next(n) {
  cancelRaf();
  document.querySelectorAll('.screen').forEach(e => e.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  historyStack.push(n);
  document.getElementById('navArea').classList.toggle('show', n != 1);
}
function goHome() { cancelRaf(); historyStack=[1]; applyZoneTheme(null); next(1); }
function goBack() {
  cancelRaf();
  if (historyStack.length > 1) {
    historyStack.pop();
    const prev = historyStack[historyStack.length-1] || 1;
    historyStack.pop();
    if (prev == 1) applyZoneTheme(null);
    next(prev);
  }
}

/* ═══════════════════════════════
   SOUND
═══════════════════════════════ */
function selectSound(freq, btn) {
  soundFreq = freq;
  document.querySelectorAll('.sound-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  previewTone(freq);
}

function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function previewTone(freq) {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.04, ctx.currentTime+0.05);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.5);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.55);
  } catch(e){}
}

function playTick() {
  try {
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator(), gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = soundFreq;
    gain.gain.setValueAtTime(0, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0.24, ctx.currentTime+0.03);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime+0.15);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime+0.18);
  } catch(e){}
}

/* ═══════════════════════════════
   BREATHING ENGINE
═══════════════════════════════ */
const INHALE=3000, EXHALE=5000, CYCLE=8000, SESSION=60000, ARC_C=629;

function cancelRaf(){ if(rafId){ cancelAnimationFrame(rafId); rafId=null; } }
function ease(t){ return t<0.5 ? 2*t*t : -1+(4-2*t)*t; }

function startBreathing() {
  next(4);
  resetRings(true);
  document.getElementById('guideChip').textContent = t('guide1min');
  document.getElementById('breathHint').textContent = '';
  document.getElementById('arcWrap').classList.remove('show');

  const start = performance.now(); let lastSec=-1;
  function frame() {
    const el = performance.now()-start;
    if (el >= SESSION) { if(zone==='storm'||zone==='fog') next('4b'); else next(5); return; }
    const pos = el % CYCLE, inPhase = pos < INHALE;
    currentPhase = inPhase;
    let sc, disp;
    if (inPhase) {
      const tt=pos/INHALE; sc=1.0+0.24*ease(tt); disp=Math.min(3,Math.floor(tt*3)+1);
    } else {
      const tt=(pos-INHALE)/EXHALE; sc=1.24-0.36*ease(tt); disp=Math.min(5,Math.floor(tt*5)+1);
    }
    applyCircle(sc, inPhase);
    document.getElementById('phaseText').textContent = t(inPhase?'phaseIn':'phaseOut');
    document.getElementById('countNum').textContent  = disp;
    const sec=Math.floor(el/1000); if(sec!==lastSec){lastSec=sec;playTick();}
    rafId=requestAnimationFrame(frame);
  }
  rafId=requestAnimationFrame(frame);
}

function startExhale() {
  next(4);
  resetRings(false);
  document.getElementById('guideChip').textContent = t('guide90s');
  document.getElementById('arcWrap').classList.add('show');
  document.getElementById('arcProg').style.strokeDashoffset = ARC_C;
  currentPhase = false;

  const EXHALE_S=90000, start=performance.now(); let lastSec=-1;
  function frame() {
    const el=performance.now()-start;
    if (el>=EXHALE_S) { document.getElementById('arcProg').style.strokeDashoffset=0; next(5); return; }
    const prog=el/EXHALE_S;
    document.getElementById('arcProg').style.strokeDashoffset = ARC_C*(1-prog);
    document.getElementById('countNum').textContent  = Math.ceil((EXHALE_S-el)/1000);
    document.getElementById('phaseText').textContent = t('phaseOut');
    const wave=Math.sin((el/5000)*Math.PI)*0.05;
    applyCircle(0.72+wave, false);
    const sec=Math.floor(el/1000); if(sec!==lastSec){lastSec=sec;playTick();}
    rafId=requestAnimationFrame(frame);
  }
  rafId=requestAnimationFrame(frame);
}

/* ═══════════════════════════════
   CIRCLE
═══════════════════════════════ */
function resetRings(show) {
  document.getElementById('ringOuter').style.display = show?'':'none';
  document.getElementById('ringMid').style.display   = show?'':'none';
}

function applyCircle(s, isInhale) {
  const core=document.getElementById('circleCore');
  const outer=document.getElementById('ringOuter');
  const mid=document.getElementById('ringMid');
  const glow=document.getElementById('ringGlow');
  core.style.transform  = `scale(${s.toFixed(4)})`;
  if(outer) outer.style.transform = `scale(${(0.82+s*0.20).toFixed(4)})`;
  if(mid)   mid.style.transform   = `scale(${(0.86+s*0.16).toFixed(4)})`;
  if(glow)  { glow.style.transform=`scale(${(s*1.3).toFixed(4)})`; glow.style.opacity=(0.5+s*0.3).toFixed(3); }
  const c1=isInhale?'--z-cin1':'--z-cout1', c2=isInhale?'--z-cin2':'--z-cout2', c3=isInhale?'--z-cin3':'--z-cout3';
  const v = k => getComputedStyle(document.documentElement).getPropertyValue(k).trim();
  core.style.background = `radial-gradient(circle at 35% 30%, ${v(c1)}, ${v(c2)}, ${v(c3)})`;
  core.style.boxShadow  = `0 0 0 1px ${v('--z-glow')}, 0 8px 40px ${v('--z-glow')}, inset 0 1px 0 rgba(255,255,255,0.40)`;
}
