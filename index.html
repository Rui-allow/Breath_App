<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Breath</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Noto+Sans+JP:wght@300;400&family=Noto+Sans:wght@300;400&family=Noto+Sans+SC:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #050d1a;
  --gold:     #c9a84c;
  --gold2:    #e8c97a;
  --gold3:    #f5e0a8;
  --text:     #eef4f8;
  --sub:      rgba(238,244,248,0.65);
  --dim:      rgba(238,244,248,0.38);
  --surface:  rgba(255,255,255,0.04);
  --surface2: rgba(255,255,255,0.08);
  --border:   rgba(201,168,76,0.18);
  --border2:  rgba(201,168,76,0.35);
  --r: 22px; --rs: 14px;
  --font-display: 'Great Vibes', cursive;
  --font-serif:   'Cormorant Garamond', serif;
  --font-sans:    'Noto Sans JP','Noto Sans SC','Noto Sans',sans-serif;
  --z-bg-a: rgba(13,107,154,0.35);
  --z-bg-b: rgba(10,74,110,0.20);
  --z-cin1: rgba(200,220,255,0.95);
  --z-cin2: rgba(100,180,230,0.88);
  --z-cin3: rgba(40,120,190,0.80);
  --z-cout1:rgba(160,200,240,0.92);
  --z-cout2:rgba(70,150,210,0.82);
  --z-cout3:rgba(20,90,160,0.75);
  --z-glow: rgba(100,180,230,0.25);
  --z-ring: rgba(126,200,227,0.22);
  --z-arc1: #7ec8e3;
  --z-arc2: #c9a84c;
  --z-btn1: #0d6b9a;
  --z-btn2: #083d5e;
  --z-bsh:  rgba(13,107,154,0.40);
  --z-card: rgba(5,18,38,0.65);
  --z-bord: rgba(201,168,76,0.18);
}

html,body{ height:100%; }
body{
  background:var(--bg);
  font-family:var(--font-sans);
  font-weight:300;
  color:var(--text);
  min-height:100vh; min-height:100dvh;
  display:flex; align-items:stretch; justify-content:center;
  overflow:hidden;
}

/* Background */
.bg{position:fixed;inset:0;z-index:0;pointer-events:none;}
.bg::before{
  content:'';position:absolute;inset:0;
  background:
    radial-gradient(ellipse 130% 70% at 65% -5%, var(--z-bg-a) 0%,transparent 55%),
    radial-gradient(ellipse 80% 60% at -10% 85%, var(--z-bg-b) 0%,transparent 55%),
    radial-gradient(ellipse 50% 40% at 100% 100%, rgba(201,168,76,0.06) 0%,transparent 55%);
  transition:background 1.4s ease;
}
.bg::after{
  content:'';position:absolute;inset:0;
  background-image:
    radial-gradient(1px 1px at 12% 22%,rgba(201,168,76,0.45) 0%,transparent 100%),
    radial-gradient(1px 1px at 33% 12%,rgba(126,200,227,0.30) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 52% 38%,rgba(201,168,76,0.38) 0%,transparent 100%),
    radial-gradient(1px 1px at 73% 18%,rgba(126,200,227,0.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 88% 42%,rgba(201,168,76,0.32) 0%,transparent 100%),
    radial-gradient(1px 1px at 22% 68%,rgba(126,200,227,0.22) 0%,transparent 100%),
    radial-gradient(1.5px 1.5px at 48% 78%,rgba(201,168,76,0.28) 0%,transparent 100%),
    radial-gradient(1px 1px at 68% 88%,rgba(126,200,227,0.32) 0%,transparent 100%),
    radial-gradient(1px 1px at 82% 65%,rgba(201,168,76,0.22) 0%,transparent 100%),
    radial-gradient(1px 1px at 8%  92%,rgba(126,200,227,0.26) 0%,transparent 100%);
}

/* App */
.app{
  position:relative;z-index:1;
  width:100%;max-width:480px;
  display:flex;flex-direction:column;
  min-height:100dvh;
}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:env(safe-area-inset-top,16px) 24px 0;
  padding-top:max(env(safe-area-inset-top),16px);
  min-height:52px;flex-shrink:0;
}
.nav-area{display:flex;gap:8px;opacity:0;pointer-events:none;transition:opacity 0.35s;}
.nav-area.show{opacity:1;pointer-events:auto;}
.nav-btn{
  background:var(--surface2);border:1px solid var(--border);
  color:var(--sub);padding:7px 16px;border-radius:99px;
  font-family:var(--font-sans);font-size:13px;font-weight:300;
  cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px);
}
.nav-btn:hover{background:rgba(201,168,76,0.12);color:var(--text);border-color:var(--border2);}
.lang-sw{
  display:flex;gap:2px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:99px;padding:3px;backdrop-filter:blur(12px);
}
.lang-btn{
  background:none;border:none;color:var(--dim);
  font-size:11px;font-family:var(--font-sans);font-weight:300;
  padding:5px 10px;border-radius:99px;cursor:pointer;
  transition:all 0.2s;letter-spacing:0.04em;
}
.lang-btn.on{background:rgba(201,168,76,0.18);color:var(--gold2);}

/* Card */
.card{
  flex:1;display:flex;flex-direction:column;
  margin:12px 16px max(env(safe-area-inset-bottom),20px);
  background:var(--z-card);
  border:1px solid var(--z-bord);
  border-radius:var(--r);
  backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);
  overflow:hidden;
  box-shadow:0 0 0 1px rgba(201,168,76,0.05),0 24px 80px rgba(0,0,0,0.55),inset 0 1px 0 rgba(201,168,76,0.12);
  transition:background 1.4s ease,border-color 1.4s ease;
}
.card::before{
  content:'';display:block;height:1.5px;flex-shrink:0;
  background:linear-gradient(90deg,transparent 0%,var(--z-arc1) 25%,var(--gold2) 50%,var(--z-arc1) 75%,transparent 100%);
  transition:background 1.4s ease;
}

/* Screens */
.screen{display:none;flex-direction:column;flex:1;padding:28px 28px 32px;}
.screen.active{display:flex;animation:su 0.55s cubic-bezier(0.22,1,0.36,1) both;}
@keyframes su{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}

/* S1 */
.brand-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:0;}
.title-brand{
  font-family:var(--font-display);font-size:86px;line-height:1;
  color:var(--gold2);
  filter:drop-shadow(0 2px 16px rgba(201,168,76,0.40));
  letter-spacing:0.02em;
}
.tagline{
  font-family:var(--font-serif);font-style:italic;font-weight:300;
  font-size:19px;color:var(--gold3);letter-spacing:0.06em;
  margin-bottom:24px;
}
.home-body{display:flex;flex-direction:column;gap:10px;}
.home-body p{font-size:17px;line-height:1.85;color:var(--text);font-weight:300;}
.home-body p.soft{color:var(--sub);}
.spacer{flex:1;min-height:8px;}

/* Sound */
.sound-wrap{padding-top:24px;}
.sound-title{
  font-size:14px;letter-spacing:0.08em;
  color:var(--gold);margin-bottom:12px;font-weight:300;
}
.sound-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
.s-btn{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--rs);padding:14px 8px;
  cursor:pointer;text-align:center;transition:all 0.22s;
  font-family:var(--font-sans);
}
.s-btn:hover{background:rgba(201,168,76,0.08);border-color:var(--border2);}
.s-btn.on{background:rgba(201,168,76,0.13);border-color:var(--border2);}
.s-hz{display:block;font-size:17px;font-weight:400;color:var(--text);margin-bottom:4px;}
.s-btn.on .s-hz{color:var(--gold2);}
.s-sub{display:block;font-size:11px;color:var(--sub);letter-spacing:0.04em;}

/* Button */
.btn{
  width:100%;padding:17px;border-radius:var(--rs);border:none;
  background:linear-gradient(135deg,var(--z-btn1) 0%,var(--z-btn2) 100%);
  color:var(--gold3);font-family:var(--font-sans);font-size:16px;
  font-weight:400;letter-spacing:0.08em;cursor:pointer;
  margin-top:20px;
  box-shadow:0 4px 24px var(--z-bsh),inset 0 1px 0 rgba(201,168,76,0.18);
  transition:transform 0.15s,box-shadow 0.2s,background 1.4s ease;
  position:relative;overflow:hidden;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,0.08) 0%,transparent 60%);
  pointer-events:none;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 32px var(--z-bsh);}
.btn:active{transform:translateY(0);}

/* S2 Mood */
.mood-title{
  font-family:var(--font-serif);font-style:italic;font-weight:300;
  font-size:24px;color:var(--gold3);text-align:center;
  margin-bottom:18px;letter-spacing:0.04em;
}
.mood-list{display:flex;flex-direction:column;gap:10px;flex:1;}
.mood-row{
  flex:1;display:flex;align-items:center;gap:20px;
  padding:0 22px;border-radius:var(--rs);
  background:var(--surface);border:1px solid var(--border);
  cursor:pointer;position:relative;overflow:hidden;
  transition:background 0.22s,border-color 0.22s,transform 0.18s;
  min-height:58px;
}
.mood-row::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,var(--gold),var(--gold2));
  opacity:0;transition:opacity 0.2s;
}
.mood-row:hover{background:var(--surface2);border-color:var(--border2);transform:translateX(3px);}
.mood-row:hover::before{opacity:1;}
.m-weather{font-size:28px;flex-shrink:0;}
.m-emotion{font-size:28px;flex-shrink:0;}

/* S3 Ack */
.ack-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.zone-badge{
  display:inline-flex;align-items:center;gap:8px;
  padding:8px 20px;border-radius:99px;
  background:rgba(201,168,76,0.10);border:1px solid rgba(201,168,76,0.25);
  font-size:22px;color:var(--gold2);margin-bottom:28px;
  transition:all 1.4s ease;
}
.ack-text{
  font-family:var(--font-serif);font-style:italic;font-weight:300;
  font-size:26px;line-height:2;color:var(--text);
}

/* S4 Breath */
.breath-wrap{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:0 20px;
}
.session-chip{
  font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
  color:var(--dim);border:1px solid var(--border);border-radius:99px;
  padding:6px 16px;margin-bottom:36px;display:flex;align-items:center;
}
.ring-wrap{position:relative;width:230px;height:230px;margin-bottom:36px;flex-shrink:0;}
.r-outer{position:absolute;inset:0;border-radius:50%;border:1px solid var(--z-ring);transform-origin:center;}
.r-mid{position:absolute;inset:24px;border-radius:50%;border:1px solid rgba(126,200,227,0.08);transform-origin:center;}
.r-glow{
  position:absolute;inset:46px;border-radius:50%;
  background:radial-gradient(circle,var(--z-glow) 0%,transparent 70%);
  filter:blur(16px);transform-origin:center;
}
.r-core{
  position:absolute;inset:46px;border-radius:50%;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transform-origin:center;
}
.r-phase{font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(5,13,26,0.72);font-weight:400;}
.r-count{
  font-family:var(--font-serif);font-style:italic;
  font-size:44px;font-weight:300;color:rgba(5,13,26,0.82);
  line-height:1;margin-top:2px;min-height:48px;
}
.breath-note{font-size:13px;color:var(--dim);letter-spacing:0.06em;text-align:center;min-height:20px;}

/* Arc */
.arc-wrap{position:absolute;inset:0;pointer-events:none;display:none;}
.arc-wrap.show{display:block;}
.arc-svg{width:100%;height:100%;transform:rotate(-90deg);}
.arc-bg{fill:none;stroke:rgba(201,168,76,0.08);stroke-width:1.5;}
.arc-prog{
  fill:none;stroke:url(#ag);stroke-width:1.5;stroke-linecap:round;
  stroke-dasharray:660;stroke-dashoffset:660;
  transition:stroke-dashoffset 0.95s linear;
}

/* S4b Trans */
.trans-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:18px;}
.trans-body p{font-family:var(--font-serif);font-style:italic;font-weight:300;font-size:24px;line-height:1.9;color:var(--text);}
.trans-body .soft{font-size:16px;color:var(--sub);font-style:normal;font-family:var(--font-sans);}

/* S5 Finish */
.fin-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
.fin-mark{font-family:var(--font-serif);font-style:italic;font-size:34px;color:var(--gold);margin-bottom:24px;letter-spacing:0.2em;}
.fin-text{font-family:var(--font-serif);font-style:italic;font-weight:300;font-size:24px;line-height:2;color:var(--text);}
.fin-note{font-size:13px;color:var(--dim);margin-top:16px;letter-spacing:0.08em;}
</style>
</head>
<body>
<div class="bg" id="bgEl"></div>
<div class="app">
  <div class="topbar">
    <div class="nav-area" id="navArea">
      <button class="nav-btn" onclick="goBack()">← 戻る</button>
      <button class="nav-btn" onclick="goHome()" data-i="home">ホーム</button>
    </div>
    <div class="lang-sw">
      <button class="lang-btn on" onclick="setLang('ja')">JP</button>
      <button class="lang-btn"   onclick="setLang('en')">EN</button>
      <button class="lang-btn"   onclick="setLang('zh')">中</button>
      <button class="lang-btn"   onclick="setLang('es')">ES</button>
    </div>
  </div>

  <div class="card" id="card">

    <!-- S1 -->
    <div id="s1" class="screen active">
      <div class="brand-row">
        <div class="title-brand">Breath</div>
      </div>
      <div class="tagline" data-i="tagline">今すぐ幸せになる</div>
      <div class="home-body">
        <p class="soft" data-i="s1p1">感情は、一気に変えることはできません</p>
        <p class="soft" data-i="s1p2">でも、少しずつなら動かせます</p>
        <p data-i="s1p3">呼吸を、少しだけ観察してみましょう</p>
      </div>
      <div class="spacer"></div>
      <div class="sound-wrap">
        <div class="sound-title" data-i="soundLabel">秒針音</div>
        <div class="sound-grid">
          <button class="s-btn" onclick="pickSound(432,this)">
            <span class="s-hz">432 Hz</span>
            <span class="s-sub" data-i="hz432">自然な共鳴</span>
          </button>
          <button class="s-btn on" onclick="pickSound(528,this)">
            <span class="s-hz">528 Hz</span>
            <span class="s-sub" data-i="hz528">修復・癒し</span>
          </button>
          <button class="s-btn" onclick="pickSound(963,this)">
            <span class="s-hz">963 Hz</span>
            <span class="s-sub" data-i="hz963">意識の覚醒</span>
          </button>
        </div>
      </div>
      <button class="btn" onclick="next(2)" data-i="s1btn">今の気分をチェックする</button>
    </div>

    <!-- S2 -->
    <div id="s2" class="screen">
      <div class="mood-title" data-i="s2title">今の気分に近いもの</div>
      <div class="mood-list">
        <div class="mood-row" onclick="pickZone('sun')"><span class="m-weather">🌞</span><span class="m-emotion">😊</span></div>
        <div class="mood-row" onclick="pickZone('cloud')"><span class="m-weather">☁️</span><span class="m-emotion">😑</span></div>
        <div class="mood-row" onclick="pickZone('rain')"><span class="m-weather">🌧️</span><span class="m-emotion">😓</span></div>
        <div class="mood-row" onclick="pickZone('storm')"><span class="m-weather">⛈️</span><span class="m-emotion">😡</span></div>
        <div class="mood-row" onclick="pickZone('fog')"><span class="m-weather">🌫️</span><span class="m-emotion">🥶</span></div>
      </div>
    </div>

    <!-- S3 -->
    <div id="s3" class="screen">
      <div class="ack-wrap">
        <div id="zoneBadge" class="zone-badge">🌞 😊</div>
        <div class="ack-text">
          <span data-i="s3p1">今の気分に気づけただけで、</span><br>
          <span data-i="s3p2">十分です</span>
        </div>
      </div>
      <button class="btn" onclick="startBreath()" data-i="s3btn">つづける</button>
    </div>

    <!-- S4 -->
    <div id="s4" class="screen" style="padding:0">
      <div class="breath-wrap">
        <div class="session-chip" id="sessionChip">通常の呼吸　1分</div>
        <div class="ring-wrap">
          <div class="arc-wrap" id="arcWrap">
            <svg class="arc-svg" viewBox="0 0 230 230">
              <defs>
                <linearGradient id="ag" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%"   stop-color="#7ec8e3" id="ag1"/>
                  <stop offset="100%" stop-color="#c9a84c" id="ag2"/>
                </linearGradient>
              </defs>
              <circle class="arc-bg"   cx="115" cy="115" r="105"/>
              <circle class="arc-prog" id="arcProg" cx="115" cy="115" r="105"/>
            </svg>
          </div>
          <div class="r-outer" id="rOuter"></div>
          <div class="r-mid"   id="rMid"></div>
          <div class="r-glow"  id="rGlow"></div>
          <div class="r-core"  id="rCore">
            <div class="r-phase" id="rPhase">吸う</div>
            <div class="r-count" id="rCount">1</div>
          </div>
        </div>
        <div class="breath-note" id="breathNote"></div>
      </div>
    </div>

    <!-- S4b -->
    <div id="s4b" class="screen">
      <div class="trans-body">
        <p data-i="transP1">次は、吐くことだけに<br>任せてみます</p>
        <p class="soft" data-i="transP2">肺の空気が、自然に出ていきます</p>
      </div>
      <button class="btn" onclick="startExhale()" data-i="transbtn">つづける</button>
    </div>

    <!-- S5 -->
    <div id="s5" class="screen">
      <div class="fin-body">
        <div class="fin-mark">✦</div>
        <div class="fin-text">
          <span data-i="finP1">それで十分です</span><br><br>
          <span data-i="finP2">あなたは今、少し上にいます</span>
        </div>
        <div class="fin-note" data-i="finNote">また、いつでも</div>
      </div>
      <button class="btn" onclick="next(1)" data-i="finBtn">もう一度</button>
    </div>

  </div>
</div>

<script>
/* ZONE THEMES */
const ZT={
  sun:{bga:'rgba(180,140,20,0.32)',bgb:'rgba(220,180,40,0.16)',
    cin1:'rgba(255,248,180,0.97)',cin2:'rgba(255,215,60,0.88)',cin3:'rgba(220,170,20,0.80)',
    cout1:'rgba(248,232,140,0.92)',cout2:'rgba(222,188,30,0.82)',cout3:'rgba(190,152,10,0.75)',
    glow:'rgba(240,205,40,0.30)',ring:'rgba(255,225,80,0.24)',
    arc1:'#f5d060',arc2:'#fae898',btn1:'#8a6008',btn2:'#b08018',bsh:'rgba(180,140,20,0.42)',
    card:'rgba(18,12,2,0.65)',bord:'rgba(240,205,40,0.24)'},
  cloud:{bga:'rgba(90,120,165,0.32)',bgb:'rgba(120,148,185,0.16)',
    cin1:'rgba(222,232,248,0.95)',cin2:'rgba(168,190,218,0.88)',cin3:'rgba(118,145,178,0.80)',
    cout1:'rgba(202,218,238,0.90)',cout2:'rgba(148,172,202,0.80)',cout3:'rgba(98,125,162,0.72)',
    glow:'rgba(158,182,212,0.24)',ring:'rgba(168,192,222,0.20)',
    arc1:'#a0bcd8',arc2:'#d0e4f4',btn1:'#486080',btn2:'#385070',bsh:'rgba(72,96,128,0.42)',
    card:'rgba(6,10,20,0.68)',bord:'rgba(168,192,222,0.22)'},
  rain:{bga:'rgba(18,58,122,0.42)',bgb:'rgba(28,78,152,0.22)',
    cin1:'rgba(148,202,252,0.95)',cin2:'rgba(58,140,222,0.88)',cin3:'rgba(18,88,182,0.80)',
    cout1:'rgba(108,178,242,0.90)',cout2:'rgba(38,115,202,0.80)',cout3:'rgba(8,68,158,0.72)',
    glow:'rgba(58,140,222,0.30)',ring:'rgba(88,168,232,0.24)',
    arc1:'#3898e8',arc2:'#80c8f0',btn1:'#082e70',btn2:'#0a40a0',bsh:'rgba(18,68,182,0.44)',

    '--z-bg-a':'rgba(13,107,154,0.35)','--z-bg-b':'rgba(10,74,110,0.20)',
    '--z-cin1':'rgba(200,220,255,0.95)','--z-cin2':'rgba(100,180,230,0.88)','--z-cin3':'rgba(40,120,190,0.80)',
    '--z-cout1':'rgba(160,200,240,0.92)','--z-cout2':'rgba(70,150,210,0.82)','--z-cout3':'rgba(20,90,160,0.75)',
    '--z-glow':'rgba(100,180,230,0.25)','--z-ring':'rgba(126,200,227,0.22)',
    '--z-arc1':'#7ec8e3','--z-arc2':'#c9a84c',
    '--z-btn1':'#0d6b9a','--z-btn2':'#083d5e','--z-bsh':'rgba(13,107,154,0.40)',
    '--z-card':'rgba(5,18,38,0.65)','--z-bord':'rgba(201,168,76,0.18)',
  };
  const m=th?{
    '--z-bg-a':th.bga,'--z-bg-b':th.bgb,
    '--z-cin1':th.cin1,'--z-cin2':th.cin2,'--z-cin3':th.cin3,
    '--z-cout1':th.cout1,'--z-cout2':th.cout2,'--z-cout3':th.cout3,
    '--z-glow':th.glow,'--z-ring':th.ring,
    '--z-arc1':th.arc1,'--z-arc2':th.arc2,
    '--z-btn1':th.btn1,'--z-btn2':th.btn2,'--z-bsh':th.bsh,
    '--z-card':th.card,'--z-bord':th.bord,
  }:d;
  for(const[k,v]of Object.entries(m))R.style.setProperty(k,v);
  if(th){document.getElementById('ag1').setAttribute('stop-color',th.arc1);document.getElementById('ag2').setAttribute('stop-color',th.arc2);}
}

let lang='ja';
const t=k=>L[lang][k]||L.ja[k]||k;
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('on',b.textContent.trim()===({ja:'JP',en:'EN',zh:'中',es:'ES'}[l])));
  applyTrans();
  document.documentElement.lang=l==='zh'?'zh-Hans':l;
}
function applyTrans(){
  document.querySelectorAll('[data-i]').forEach(el=>{const v=t(el.getAttribute('data-i'));if(v.includes('<br>'))el.innerHTML=v;else el.textContent=v;});
  if(curPhase!==null)document.getElementById('rPhase').textContent=t(curPhase?'phIn':'phOut');
}

/* STATE */
let zone='',hist=[1],rafId=null,actx=null,freq=528,curPhase=null;
const ZE={sun:'🌞 😊',cloud:'☁️ 😑',rain:'🌧️ 😓',storm:'⛈️ 😡',fog:'🌫️ 🥶'};

/* NAV */
function next(n){
  cancelRaf();
  document.querySelectorAll('.screen').forEach(e=>e.classList.remove('active'));
  document.getElementById('s'+n).classList.add('active');
  hist.push(n);
  document.getElementById('navArea').classList.toggle('show',n!=1);
}
function goHome(){cancelRaf();hist=[1];applyTheme(null);next(1);}
function goBack(){
  cancelRaf();
  if(hist.length>1){hist.pop();const p=hist[hist.length-1]||1;hist.pop();if(p==1)applyTheme(null);next(p);}
}

/* ZONE */
function pickZone(z){zone=z;applyTheme(z);document.getElementById('zoneBadge').textContent=ZE[z];next(3);}

/* SOUND */
function pickSound(f,btn){freq=f;document.querySelectorAll('.s-btn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');preview(f);}
function getAC(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx;}
function preview(f){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.06,c.currentTime+0.05);g.gain.linearRampToValueAtTime(0,c.currentTime+0.5);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.55);}catch(e){}}
function tick(){try{const c=getAC(),o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=freq;g.gain.setValueAtTime(0,c.currentTime);g.gain.linearRampToValueAtTime(0.24,c.currentTime+0.03);g.gain.linearRampToValueAtTime(0,c.currentTime+0.15);o.connect(g);g.connect(c.destination);o.start();o.stop(c.currentTime+0.18);}catch(e){}}

/* ENGINE */
const IN=3000,EX=5000,CYC=8000,SES=60000,ARC=660;
function cancelRaf(){if(rafId){cancelAnimationFrame(rafId);rafId=null;}}
function ease(t){return t<0.5?2*t*t:-1+(4-2*t)*t;}

function startBreath(){
  next(4);showRings(true);
  document.getElementById('arcWrap').classList.remove('show');
  document.getElementById('sessionChip').textContent=t('guide1m');
  document.getElementById('breathNote').textContent='';
  const start=performance.now();let ls=-1;
  function f(){
    const el=performance.now()-start;
    if(el>=SES){if(zone==='storm'||zone==='fog')next('4b');else next(5);return;}
    const pos=el%CYC,isIn=pos<IN;curPhase=isIn;
    let sc,disp;
    if(isIn){const tt=pos/IN;sc=1+0.26*ease(tt);disp=Math.min(3,Math.floor(tt*3)+1);}
    else{const tt=(pos-IN)/EX;sc=1.26-0.38*ease(tt);disp=Math.min(5,Math.floor(tt*5)+1);}
    drawC(sc,isIn);
    document.getElementById('rPhase').textContent=t(isIn?'phIn':'phOut');
    document.getElementById('rCount').textContent=disp;
    const s=Math.floor(el/1000);if(s!==ls){ls=s;tick();}
    rafId=requestAnimationFrame(f);
  }
  rafId=requestAnimationFrame(f);
}

function startExhale(){
  next(4);showRings(false);
  document.getElementById('arcWrap').classList.add('show');
  document.getElementById('arcProg').style.strokeDashoffset=ARC;
  document.getElementById('sessionChip').textContent=t('guide90');
  curPhase=false;
  const ES=90000,start=performance.now();let ls=-1;
  function f(){
    const el=performance.now()-start;
    if(el>=ES){document.getElementById('arcProg').style.strokeDashoffset=0;next(5);return;}
    document.getElementById('arcProg').style.strokeDashoffset=ARC*(1-el/ES);
    document.getElementById('rCount').textContent=Math.ceil((ES-el)/1000);
    document.getElementById('rPhase').textContent=t('phOut');
    drawC(0.72+Math.sin((el/5000)*Math.PI)*0.05,false);
    const s=Math.floor(el/1000);if(s!==ls){ls=s;tick();}
    rafId=requestAnimationFrame(f);
  }
  rafId=requestAnimationFrame(f);
}

function showRings(v){document.getElementById('rOuter').style.display=v?'':'none';document.getElementById('rMid').style.display=v?'':'none';}

function drawC(s,isIn){
  const core=document.getElementById('rCore');
  const outer=document.getElementById('rOuter');
  const mid=document.getElementById('rMid');
  const glow=document.getElementById('rGlow');
  core.style.transform=`scale(${s.toFixed(4)})`;
  if(outer)outer.style.transform=`scale(${(0.82+s*0.20).toFixed(4)})`;
  if(mid)mid.style.transform=`scale(${(0.86+s*0.16).toFixed(4)})`;
  if(glow){glow.style.transform=`scale(${(s*1.3).toFixed(4)})`;glow.style.opacity=(0.4+s*0.35).toFixed(3);}
  const g=k=>getComputedStyle(document.documentElement).getPropertyValue(k).trim();
  const c1=isIn?'--z-cin1':'--z-cout1',c2=isIn?'--z-cin2':'--z-cout2',c3=isIn?'--z-cin3':'--z-cout3';
  core.style.background=`radial-gradient(circle at 35% 30%,${g(c1)},${g(c2)},${g(c3)})`;
  core.style.boxShadow=`0 0 0 1px ${g('--z-glow')},0 8px 40px ${g('--z-glow')},inset 0 1px 0 rgba(255,255,255,0.35)`;
}
