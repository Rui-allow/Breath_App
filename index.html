<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>One Step Happier</title>
<link rel="apple-touch-icon" id="touch-icon" href="">
<link rel="icon" id="favicon" href="">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  min-height:100vh;
  background:#1a1020;
  display:flex; flex-direction:column; align-items:center;
  font-family:'Hiragino Mincho ProN','Yu Mincho',Georgia,serif;
  color:#f0f0f0;
  padding:0 24px 80px;
  transition:background 2.5s ease;
}
#app { max-width:460px; width:100%; }
.header { text-align:center; padding:48px 0 32px; position:relative; }
.home-btn { position:absolute; top:16px; right:0; background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:6px 14px; color:rgba(255,255,255,0.6); cursor:pointer; font-size:11px; letter-spacing:2px; transition:all 0.2s; font-family:inherit; }
.home-btn:hover { background:rgba(255,255,255,0.18); color:#fff; }
.header-icon { font-size:48px; margin-bottom:12px; display:block; }
.header-label { font-size:10px; letter-spacing:7px; color:rgba(255,255,255,0.4); margin-bottom:10px; }
.header-title { font-size:24px; font-weight:bold; color:#fff; letter-spacing:1px; }
.header-sub { font-size:12px; color:rgba(255,255,255,0.55); margin-top:8px; letter-spacing:2px; }
.zone-chip { display:inline-flex; align-items:center; gap:7px; padding:6px 16px; border-radius:20px; font-size:13px; margin-top:14px; }

/* 言語選択 */
.lang-bar { display:flex; justify-content:center; gap:8px; margin-bottom:20px; flex-wrap:wrap; }
.lang-btn { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); border-radius:20px; padding:5px 14px; color:rgba(255,255,255,0.7); cursor:pointer; font-size:12px; transition:all 0.2s; }
.lang-btn:hover,.lang-btn.active { background:rgba(255,255,255,0.2); color:#fff; border-color:rgba(255,255,255,0.5); }

.screen { animation:fadeUp 0.7s ease forwards; }
@keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
@keyframes flutter {
  0%{transform:scale(1) rotate(-2deg)} 25%{transform:scale(1.05) rotate(2deg)}
  50%{transform:scale(1) rotate(-1deg)} 75%{transform:scale(1.03) rotate(1deg)} 100%{transform:scale(1) rotate(-2deg)}
}

.intro-text { font-size:15px; line-height:2.1; color:#d0d0e8; margin-bottom:32px; }
.intro-note { color:#9090b8; font-size:13px; }

.zone-card { border-radius:12px; padding:14px 18px; display:flex; gap:14px; margin-bottom:8px; }
.zone-card-name { font-size:15px; font-weight:bold; margin-bottom:3px; }
.zone-card-range { font-size:11px; color:rgba(255,255,255,0.5); margin-left:8px; }
.zone-card-desc { font-size:12px; color:#b0b0cc; line-height:1.7; }

.tipping { text-align:center; font-size:11px; color:rgba(255,255,255,0.35); padding:8px 0; letter-spacing:5px; margin:4px 0; }

.emo-btn { width:100%; background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15); border-radius:10px; padding:11px 16px; color:#e0e0f0; cursor:pointer; font-family:inherit; font-size:14px; display:flex; align-items:center; gap:14px; transition:all 0.2s; text-align:left; margin-bottom:5px; }
.emo-btn:hover { background:rgba(255,255,255,0.14); color:#fff; }
.emo-num { font-size:13px; min-width:24px; color:rgba(255,255,255,0.45); font-weight:bold; }

.msg-box { min-height:180px; font-size:17px; line-height:2.3; padding:8px 0; margin-bottom:8px; white-space:pre-wrap; }
.cursor { animation:blink 1s infinite; opacity:0.5; }

/* ボタン群 */
.btn-row { display:flex; align-items:center; justify-content:center; gap:16px; margin-top:24px; flex-wrap:wrap; }
.nb { background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.35); border-radius:40px; padding:12px 36px; color:#fff; cursor:pointer; font-family:inherit; font-size:14px; letter-spacing:2px; transition:all 0.3s; }
.nb:hover { border-color:rgba(255,255,255,0.7); background:rgba(255,255,255,0.18); }
.nb-back { background:transparent; border:1px solid rgba(255,255,255,0.2); border-radius:40px; padding:10px 22px; color:rgba(255,255,255,0.55); cursor:pointer; font-family:inherit; font-size:13px; letter-spacing:1px; transition:all 0.3s; }
.nb-back:hover { border-color:rgba(255,255,255,0.45); color:rgba(255,255,255,0.85); }
.nb-ghost { background:transparent; border:none; color:rgba(255,255,255,0.35); cursor:pointer; font-family:inherit; font-size:12px; letter-spacing:2px; margin-top:8px; display:block; margin-left:auto; margin-right:auto; }

/* 呼吸 */
.breath-wrap { display:flex; flex-direction:column; align-items:center; gap:20px; padding:36px 0; }
.breath-circle { width:130px; height:130px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; letter-spacing:1px; }
.breath-timer { font-size:14px; color:rgba(255,255,255,0.55); letter-spacing:4px; }
.breath-label { font-size:15px; color:#d0d0f0; text-align:center; line-height:2; margin-bottom:4px; }
.breath-label span { font-size:13px; color:#9090b8; }
.breath-hint { font-size:13px; color:#9090b8; text-align:center; line-height:2; }

.done-ornament { font-size:11px; color:rgba(255,255,255,0.3); letter-spacing:4px; text-align:center; margin-bottom:8px; }
.done-btns { text-align:center; display:flex; flex-direction:column; gap:14px; align-items:center; }
.select-hint { font-size:14px; color:#b8b8d8; margin-bottom:20px; line-height:1.9; }
.select-hint span { font-size:12px; color:#8888a8; }
.center { text-align:center; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <span class="header-icon" id="header-butterfly">🦋</span>
    <div class="header-label" id="header-label">ONE STEP HAPPIER</div>
    <div class="header-title" id="header-title">今すぐ幸せになる</div>
    <div class="header-sub" id="header-sub">1ミリ上を目指すセッション</div>
    <div id="zone-chip-wrap"></div>
  </div>
  <div class="lang-bar" id="lang-bar"></div>
  <div id="screen"></div>
</div>

<script>
// ============================================================
// 多言語テキスト
// ============================================================
const LANGS = {
  ja: {
    code:"ja", label:"日本語",
    headerTitle:"今すぐ幸せになる",
    headerSub:"1ミリ上を目指すセッション",
    introText:`感情には段階があります。\n嵐の中にいるとき、いきなり快晴にはなれません。\nそれは自然の法則に反しています。\n\n今日のゴールは今いる場所がどこであれ、\n1段だけ上の気分に移動することです。\n\n感情は少しずつなら意図的に\nましな気分に変えられます。\n\nそれを体験してください。`,
    introNote:`感情は1段ずつ、意図的にコントロールできます。`,
    tipping:"── Turning Point ──",
    startBtn:"今の気分を確認する",    selectHint:"今の気分に最も近い感情を選んでください。",
    selectHint2:"1番（喜び）が上、22番（絶望）が下です。",
    continueBtn:"続ける",
    endBtn:"終わる",
    breathBtn:"呼吸を始める",
    breathAgainBtn:"もう一度",
    skipBtn:"今日はスキップする",
    backBtn:"← 戻る",
    restartBtn:"最初に戻る",
    recheckBtn:"もう一度気分を確認する",
    breath30label:"呼吸を観察してください。",
    breath30sub:"変えなくていい。ただ気づくだけでいい。",
    breath60label:"1分間、呼吸だけに意識を向けましょう。",
    breathHint:"出てきた → 気づく → 手放す → 呼吸に戻る。",
    inhale:"吸う  3秒", exhale:"吐く  5秒",
    tickSoundTitle:"秒針音",
    soundLabels:{ hz432:"🌌 432Hz", hz528:"✨ 528Hz", hz963:"👑 963Hz", delta:"🌊 デルタ波" },
    reminderBtn:"🔔 毎日リマインダーを設定する",
    reminderSet:"通知時間を選んでください",
    reminderSave:"設定する",
    reminderCancel:"キャンセル",
    reminderOn:"🔔 毎日 {time} に通知します",
    reminderOff:"通知をオフにする",
    notifyTitle:"今すぐ幸せになる",
    notifyBody:"今日の気分を少しだけあげてみませんか？",
    notifyDenied:"通知がブロックされています。\nブラウザの設定から許可してください。",
    zones:{
      storm:{ name:"嵐", desc:"これ以上ないひどい気分。何もしたくない状態。" },
      rain:{  name:"雨", desc:"思考が重い。プレッシャーを感じている。呼吸で1段上を目指す。" },
      cloud:{ name:"曇り", desc:"何かがずれている感覚。呼吸で立ち止まる時間。" },
      sunny:{ name:"快晴", desc:"気分が良い状態。直感に従っていい。" },
    },
    emotions:[
      {n:1,  label:"喜び・愛・感謝・自由"},
      {n:2,  label:"情熱"},
      {n:3,  label:"熱意・意欲・幸福"},
      {n:4,  label:"前向きな期待・信念"},
      {n:5,  label:"楽観的な姿勢"},
      {n:6,  label:"希望"},
      {n:7,  label:"満足"},
      {n:8,  label:"退屈"},
      {n:9,  label:"悲観的な姿勢"},
      {n:10, label:"不満・苛立ち・焦り"},
      {n:11, label:"打ちのめされている"},
      {n:12, label:"失望"},
      {n:13, label:"疑い"},
      {n:14, label:"心配"},
      {n:15, label:"非難"},
      {n:16, label:"落胆"},
      {n:17, label:"怒り"},
      {n:18, label:"復讐心"},
      {n:19, label:"嫌悪・憤り"},
      {n:20, label:"嫉妬"},
      {n:21, label:"恐れ・悲しみ・罪悪感"},
      {n:22, label:"絶望・無力感・うつ状態"},
    ],
    getMsgs(n, goalLabel, nLabel="") {
      const z = getZone(n);
      if (z.id==="storm") return [
        `${n}番　${nLabel}。\n\n今日はただ一つだけ、お願いがあります。`,
        `休んでください。\n体の力を緩めましょう。\n考えないでください。\nできれば、寝てください。`,
        `寝ている間、人間は思考しません。\nそれだけで、嵐は少し静まります。`,
        `目が覚めた瞬間がチャンスです。\n思考が動き始める前に、\nそっと呼吸に意識を向けてください。\n\nそれで十分です。`,
        `今日はそれだけです。\n\nでも少しだけ、呼吸を観察してみましょうか？\n\n今はそれで十分です。`,
      ];
      if (n===1) return [
        `1番　${nLabel}。\n快晴ゾーンにいます。\n明晰さを感じています。`,
        `あなた本来の純粋なエネルギーが\n存分に流れています。\n感じましょう。\n味わいましょう。\n\nふとした直感がきたら、\nそのまま従ってみましょう。`,
        `呼吸を感じながら、\nその感覚をもう少し味わいましょう。`,
      ];
      if (z.id==="sunny") return [
        `${n}番　${nLabel}。\n\n今の呼吸を感じましょう。\nとてもいい気分ですね。`,
        `今、呼吸しています。\nその呼吸を、ただ観察してください。\n深くなるのを感じてください。`,
        `息が入ってくる。\n息が出ていく。\n\nそれだけに意識を向けてください。\n30秒、やってみましょう。`,
        `呼吸を観察している間、\nいろんな思考が出ても大丈夫です。\nそっと手放しましょう。\n\n出てきた → 気づく → 手放す → 呼吸に戻る。`,
        `今日のゴールは\n「${goalLabel}」の感覚。\n\n1ミリだけ。呼吸を観察しましょう。`,
      ];
      return [
        `${n}番　${nLabel}。\n\n体の力を緩めてみましょう。\n\nそれで十分です。`,
        `今、呼吸しています。\nその呼吸を、ただ観察してください。\n深くなるのを感じてください。`,
        `息が入ってくる。\n息が出ていく。\n\nそれだけに意識を向けてください。\n30秒、やってみましょう。`,
        `呼吸を観察している間、\nいろんな思考が出ても大丈夫です。\nそっと手放しましょう。\n\n出てきた → 気づく → 手放す → 呼吸に戻る。`,
        `今日のゴールは\n「${goalLabel}」の感覚。\n\n呼吸を観察しましょう。\n呼吸に気づく。\n気づくことは大きな進歩です。`,
      ];
    },
    afterBreathStorm:`もう少し楽になりたいですか？\n\n今度は「吐く」だけです。\n\nゆっくり、ゆっくり、\n肺の中が空っぽになるまで吐ききってください。\n\n吐ききると、体が自然に\n深く息を吸い始めます。\n\n90秒、秒針に合わせて\n吐き続けてみましょう。`,
    exhaleLabel:"吐く",
    afterBreathSunny:`深い呼吸を楽しめましたか？\n\n気分の良いとき、呼吸はゆったりと深くなります。\nそれがあなた本来のエネルギー状態です。\n思い出していますね。本当の自分を。\n\n存分に味わいましょう。\n\nもう一度、今度は1分間。\nこの心地よさを、さらに深めましょう。`,
    afterBreathOther:`呼吸に意識を向けている間、\n少し静かになりませんでしたか？\n\n呼吸が浅くなっていることに気づけたら\n呼吸は深くなります。\n\n呼吸に意識を向けると、\n体は自然に、深く呼吸し始めます。\n\nもう一度、今度は1分間。\n思考が出てきたら、そっと手放しましょう。\nそして呼吸に戻りましょう。`,
    doneStorm:`吐ききれましたか？\n始めは少しで大丈夫です。\n\n深く吸いましたか？\n\n勢いよく吸えた時の爽快感を\n味わってくださいね。\n\n今日はここまでです。\n\nくつろいでください。\nできれば寝てください。\n\n寝ている間、人間は思考しません。\n\n目が覚めた瞬間に\n呼吸に意識を向けてください。\n\nまた来てくださいね。`,
    done1:`今のあなたは快晴ゾーンにいます。\n\n直感に従ってください。\n浮かんできたことを、やってみてください。\n\nその感覚を大切に。\n自分を信頼しましょう。`,
    doneSunny(goalLabel){return `今日のセッションはここまでです。\n\nあなた本来の純粋なエネルギーの中にいます。\nそのままの気分を味わってください。\n\nなにげない直感が来たら従ってみましょう。\n\n今日のゴールは「${goalLabel}」\nの感覚に近づくこと。\n\n明日また1段。それだけでいい。`;},
    doneOther(goalLabel){return `今日のセッションはここまでです。\n\n1ミリ感情が動きました。\n小さな変化です。\nそれで十分です。\n少しだけ、ましになった気分を感じてくださいね。\n\n今日のゴールは「${goalLabel}」\nの感覚に近づくこと。\n\n明日また1段。それだけでいい。`;}
  },

  en: {
    code:"en", label:"English",
    headerTitle:"One Step Happier",
    headerSub:"Just one step at a time",
    introText:`Emotions come in levels.\nWhen you're in a storm,\nyou can't jump straight to sunshine.\nThat would go against the laws of nature.\n\nToday's goal — wherever you are —\nis to move just one level up.\n\nEmotions can be shifted intentionally,\nlittle by little, toward feeling better.\n\nExperience it for yourself.`,
    introNote:`Emotions can be controlled intentionally, one step at a time.`,
    tipping:"── Turning Point ──",
    startBtn:"Check your mood",
    selectHint:"Choose the emotion closest to how you feel right now.",
    selectHint2:"1 = Joy (lightest), 22 = Despair (heaviest).",
    continueBtn:"Continue",
    endBtn:"Finish",
    breathBtn:"Start breathing",
    breathAgainBtn:"Once more",
    skipBtn:"Skip for today",
    backBtn:"← Back",
    restartBtn:"Start over",
    recheckBtn:"Check mood again",
    breath30label:"Observe your breath.",
    breath30sub:"Don't change it. Just notice it.",
    breath60label:"Focus only on your breath for 1 minute.",
    breathHint:"Notice → Acknowledge → Release → Return to breath.",
    inhale:"Inhale  3s", exhale:"Exhale  5s",
    tickSoundTitle:"Tick Sound",
    soundLabels:{ hz432:"🌌 432Hz", hz528:"✨ 528Hz", hz963:"👑 963Hz", delta:"🌊 Delta Wave" },
    reminderBtn:"🔔 Set Daily Reminder",
    reminderSet:"Choose notification time",
    reminderSave:"Set",
    reminderCancel:"Cancel",
    reminderOn:"🔔 Daily reminder at {time}",
    reminderOff:"Turn off notifications",
    notifyTitle:"One Step Happier",
    notifyBody:"Shall we lift your mood just a little today?",
    notifyDenied:"Notifications are blocked.\nPlease allow them in your browser settings.",
    zones:{
      storm:{ name:"Storm", desc:"Feeling as bad as it gets. No energy for anything." },
      rain:{  name:"Rain",  desc:"Thoughts feel heavy. Use breath to move one step up." },
      cloud:{ name:"Cloudy", desc:"Something feels off. Time to pause with your breath." },
      sunny:{ name:"Sunny", desc:"You feel good. Trust your instincts." },
    },
    emotions:[
      {n:1,  label:"Joy · Love · Gratitude · Freedom"},
      {n:2,  label:"Passion"},
      {n:3,  label:"Enthusiasm · Eagerness · Happiness"},
      {n:4,  label:"Positive expectation · Belief"},
      {n:5,  label:"Optimism"},
      {n:6,  label:"Hopefulness"},
      {n:7,  label:"Contentment"},
      {n:8,  label:"Boredom"},
      {n:9,  label:"Pessimism"},
      {n:10, label:"Frustration · Irritation · Impatience"},
      {n:11, label:"Overwhelm"},
      {n:12, label:"Disappointment"},
      {n:13, label:"Doubt"},
      {n:14, label:"Worry"},
      {n:15, label:"Blame"},
      {n:16, label:"Discouragement"},
      {n:17, label:"Anger"},
      {n:18, label:"Revenge"},
      {n:19, label:"Hatred · Rage"},
      {n:20, label:"Jealousy"},
      {n:21, label:"Fear · Grief · Guilt"},
      {n:22, label:"Despair · Powerlessness · Depression"},
    ],
    getMsgs(n, goalLabel, nLabel="") {
      const z = getZone(n);
      if (z.id==="storm") return [
        `#${n}  ${nLabel}.\n\nJust one request for today.`,
        `Rest.\nRelax your body.\nStop thinking.\nIf you can — sleep.`,
        `While you sleep, the mind stops.\nThat alone calms the storm a little.`,
        `The moment you wake up is your chance.\nBefore thoughts begin,\ngently bring your attention to your breath.\n\nThat's enough.`,
        `That's all for today.\n\nBut shall we observe the breath\njust a little?`,
        `Shall we observe the breath\njust a little?\n\nThat's enough for now.`,
      ];
      if (n===1) return [
        `#1  ${nLabel}.
 You're in the Sunny zone.\nYou feel clarity.`,
        `Your pure natural energy is flowing freely.\nFeel it.\nSavor it.\n\nIf an intuition arises,\nfollow it.`,
        `Feel your breath\nand enjoy this feeling a little longer.`,
      ];
      if (z.id==="sunny") return [
        `#${n}  ${nLabel}.\n\nFeel your breath right now.\nYou're feeling good.`,
        `You are breathing.\nJust observe that breath.\nFeel it deepen.`,
        `Breathe in.\nBreathe out.\n\nFocus only on that.\nLet's try for 30 seconds.`,
        `Thoughts may have come up while observing.\nThat's okay.\nGently release them.\n\nNotice → Acknowledge → Release → Return.`,
        `Today's goal:\n"${goalLabel}"\n\nJust one step. Observe your breath.`,
      ];
      return [
        `#${n}  ${nLabel}.\n\nRelax your body.\nLet go of any tension.\n\nThat's enough.`,
        `You are breathing.\nJust observe that breath.\nFeel it deepen.`,
        `Breathe in.\nBreathe out.\n\nFocus only on that.\nLet's try for 30 seconds.`,
        `Thoughts may have come up while observing.\nThat's okay.\nGently release them.\n\nNotice → Acknowledge → Release → Return.`,
        `Today's goal:\n"${goalLabel}"\n\nJust one step. Observe your breath.`,
      ];
    },
    afterBreathStorm:`Would you like to feel a little better?\n\nThis time — just exhale.\n\nSlowly, slowly,\nexhale until your lungs are completely empty.\n\nWhen you exhale fully,\nyour body will naturally breathe deeply in.\n\n90 seconds — follow the tick.\nJust keep exhaling.`,
    exhaleLabel:"Exhale",
    afterBreathSunny:`Did you enjoy the deep breath?\n\nWhen you feel good, your breath is naturally deep and slow.\nThis is your natural state of energy.\nYou are remembering your true self.\n\nSavor it fully.\n\nOnce more — this time for 1 minute.\nLet's deepen this feeling even more.`,
    afterBreathOther:`Did things feel a little quieter\nwhile you focused on your breath?\n\nWhen we feel low, our breath becomes shallow.\nBut when we turn attention to it,\nthe body naturally begins to breathe deeper.\n\nOnce more — this time for 1 minute.\nWhen thoughts arise, gently release them\nand return to your breath.`,
    doneStorm:`Did you exhale fully?\nA little is enough at first.\n\nDid you breathe in deeply?\n\nSavor that rush of fresh air\nwhen it came in.\n\nThat's enough for today.\n\nRest. Sleep if you can.\n\nWhile you sleep, the mind stops.\n\nThe moment you wake,\nbring your attention to your breath.\n\nCome back again.`,

const ZONES = {
  storm:{ id:"storm", emoji:"⛈",  range:[17,22], bg:"#2a1040", accent:"#7c3aed", glow:"#c4b5fd", text:"#f0e8ff" },
  rain: { id:"rain",  emoji:"🌧", range:[12,16], bg:"#0f2040", accent:"#2563eb", glow:"#93c5fd", text:"#e0f0ff" },
  cloud:{ id:"cloud", emoji:"🌤", range:[8,11],  bg:"#0f2030", accent:"#0891b2", glow:"#67e8f9", text:"#e0f8ff" },
  sunny:{ id:"sunny", emoji:"☀️", range:[1,7],   bg:"#0a2818", accent:"#16a34a", glow:"#86efac", text:"#e0ffe8" },
};

function getZone(n) {
  if (n >= 17) return ZONES.storm;
  if (n >= 12) return ZONES.rain;
  if (n >= 8)  return ZONES.cloud;
  return ZONES.sunny;
}

let lang = LANGS.ja;
let state = { step:"intro", n:null, zone:null, goalN:null, goalLabel:null, msgs:[], mi:0, history:[] };

function setState(patch) {
  if (patch.step && patch.step !== state.step) {
    state.history.push(state.step);
  }
  Object.assign(state, patch);
  render();
}

function goBack() {
  if (state.history.length === 0) return;
  const prev = state.history.pop();
  state.step = prev;
  // breathステップから戻るときインターバルをクリア
  if (state.breathInterval) { state.breathInterval.clear(); state.breathInterval = null; }
  if (state.countInterval)  { clearInterval(state.countInterval); state.countInterval = null; }
  render();
}

let _audioCtx = null;
function getAudioCtx() {
  if (!_audioCtx || _audioCtx.state === "closed") {
    _audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
  if (_audioCtx.state === "suspended") _audioCtx.resume();
  return _audioCtx;
}
document.addEventListener("touchstart", function initAudio() {
  try { getAudioCtx(); } catch(e) {}
}, { once: true });

let currentSound = localStorage.getItem("tickSound") || "hz528";


const SOUNDS = {
  hz432: {
    label:"🌌 432Hz",
    play(ctx) {
      const now=ctx.currentTime;
      [432, 864, 1296].forEach((freq,i) => {
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type="sine"; osc.frequency.value=freq;
        g.gain.setValueAtTime([0.18,0.07,0.03][i], now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.32);
        osc.start(now); osc.stop(now+0.32);
      });
    }
  },
  hz528: {
    label:"✨ 528Hz",
    play(ctx) {
      const now=ctx.currentTime;
      [528, 1056, 1584].forEach((freq,i) => {
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type="sine"; osc.frequency.value=freq;
        g.gain.setValueAtTime([0.18,0.07,0.03][i], now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.28);
        osc.start(now); osc.stop(now+0.28);
      });
    }
  },
  hz963: {
    label:"👑 963Hz",
    play(ctx) {
      const now=ctx.currentTime;
      [963, 1926].forEach((freq,i) => {
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type="sine"; osc.frequency.value=freq;
        g.gain.setValueAtTime(i===0?0.16:0.05, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.22);
        osc.start(now); osc.stop(now+0.22);
      });
    }
  },
  delta: {
    label:"🌊 デルタ波",
    play(ctx) {
      const now=ctx.currentTime;
      // 200Hzと202Hzで2Hzのバイノーラルビート（デルタ波域）
      // + 528Hzの軽いキャリア音で存在感を持たせる
      [[200,0.15],[202,0.15],[528,0.06]].forEach(([freq,vol]) => {
        const osc=ctx.createOscillator(), g=ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type="sine"; osc.frequency.value=freq;
        g.gain.setValueAtTime(vol, now);
        g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
        osc.start(now); osc.stop(now+0.4);
      });
    }
  }
};


function playTick() {
  try {
    const ctx = getAudioCtx();
    if (!ctx) return;
    SOUNDS[currentSound].play(ctx);
  } catch(e) {}
}

function renderSoundSelector(container) {
  const wrap = document.createElement("div");

  Object.entries(SOUNDS).forEach(([id, s]) => {

    const btn = document.createElement("button");

let twTimer = null;
function typewrite(el, text, speed, onDone) {
  if (twTimer) clearInterval(twTimer);
  let i = 0; el.innerHTML = "";
  const cur = document.createElement("span");
  cur.className = "cursor"; cur.textContent = "▌";
  twTimer = setInterval(() => {
    if (i < text.length) { el.textContent = text.slice(0,i+1); el.appendChild(cur); i++; }
    else { clearInterval(twTimer); cur.remove(); onDone?.(); }
  }, speed);
}

function startBreath(zone, seconds, onDone) {
  const circle = document.getElementById("breath-circle");
  const timer  = document.getElementById("breath-timer");
  if (!circle || !timer) return;
  circle.style.background = `radial-gradient(circle,${zone.glow}28 0%,transparent 70%)`;
  circle.style.border = `1.5px solid ${zone.glow}77`;
  circle.style.color  = `${zone.glow}ee`;
  let phase = "in", left = seconds;
  const INHALE = 3000, EXHALE = 5000;
  function updateCircle() {
    const dur = phase==="in" ? INHALE : EXHALE;
    circle.style.transition = `transform ${dur}ms cubic-bezier(0.4,0,0.2,1)`;
    circle.style.transform  = `scale(${phase==="in"?1.3:0.78})`;
    circle.textContent = phase==="in" ? lang.inhale : lang.exhale;
  }
  updateCircle();
  if (state.breathInterval) state.breathInterval.clear();
  if (state.countInterval)  clearInterval(state.countInterval);
  let phaseTimer;
  function scheduleNext() {
    const dur = phase==="in" ? INHALE : EXHALE;
    phaseTimer = setTimeout(() => { phase = phase==="in"?"out":"in"; updateCircle(); scheduleNext(); }, dur);
  }
  scheduleNext();
  state.breathInterval = { clear: () => clearTimeout(phaseTimer) };
  const ci = setInterval(() => {
    left--; playTick();
    if (timer) timer.textContent = left > 0 ? `${left}s` : "✓";
    if (left <= 0) { clearInterval(ci); state.breathInterval?.clear(); onDone?.(); }
  }, 1000);
  state.countInterval = ci;
  timer.textContent = `${left}s`;
}

// 蝶アイコン生成（512×512px - Retina対応）

function generateButterflyIcon() {
  try {
    const S = 512;
    const c = document.createElement("canvas");
    c.width = S; c.height = S;
    const ctx = c.getContext("2d");
    // ダーク背景（グラデーション）
    const bg = ctx.createRadialGradient(S*0.5,S*0.45,S*0.05, S*0.5,S*0.5,S*0.5);
    bg.addColorStop(0,"#2a1248");
    bg.addColorStop(1,"#0a0518");
    ctx.fillStyle = bg;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(0,0,S,S,S*0.2); else ctx.rect(0,0,S,S);
    ctx.fill();
    // 光彩
    const glow = ctx.createRadialGradient(S*0.5,S*0.5,S*0.05, S*0.5,S*0.5,S*0.42);
    glow.addColorStop(0,"rgba(190,140,255,0.3)");
    glow.addColorStop(0.5,"rgba(120,90,220,0.12)");
    glow.addColorStop(1,"rgba(0,0,0,0)");
    ctx.fillStyle = glow;
    ctx.fillRect(0,0,S,S);
    // 蝶（大きく・くっきり）
    ctx.font = `${Math.floor(S*0.62)}px serif`;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.shadowColor = "rgba(190,140,255,0.95)";
    ctx.shadowBlur = S * 0.08;
    ctx.fillText("🦋", S*0.5, S*0.52);
    ctx.shadowBlur = 0;
    const dataURL = c.toDataURL("image/png");
    document.getElementById("touch-icon").href = dataURL;
    document.getElementById("favicon").href = "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%231a0a2e'/><text y='.88em' font-size='72' x='10'>🦋</text></svg>";
  } catch(e) {}
}

function render() {

  document.body.style.background = z ? z.bg : "#1a1020";
  document.getElementById("header-title").textContent = lang.headerTitle;

  renderLangBar();
  // HOMEボタン（intro以外の画面で表示）

  if (existingHome) existingHome.remove();
  if (state.step !== "intro") {
    const homeBtn = document.createElement("button");
    homeBtn.id = "home-btn";
    homeBtn.className = "home-btn";
    homeBtn.textContent = "HOME";

    document.querySelector(".header").appendChild(homeBtn);
  }
  scr.innerHTML = "";
  const div = document.createElement("div");
  div.className = "screen";
  if      (state.step==="intro")        renderIntro(div);
  else if (state.step==="select")       renderSelect(div);
  else if (state.step==="session")      renderSession(div);
  else if (state.step==="breath")       renderBreath(div,30,"afterbreath");
  else if (state.step==="afterbreath")  renderAfterBreath(div);
  else if (state.step==="breathstorm")  renderBreathStorm(div);
  else if (state.step==="breath2")      renderBreath(div,60,"done");
  else if (state.step==="done")         renderDone(div);
  scr.appendChild(div);
}

let reminderInterval = null;

function getReminderTime() {
  try { return localStorage.getItem("reminderTime") || null; } catch(e) { return null; }
}
function setReminderTime(t) {
  try { localStorage.setItem("reminderTime", t); } catch(e) {}
}
function clearReminderTime() {
  try { localStorage.removeItem("reminderTime"); } catch(e) {}
}

function scheduleReminder(timeStr) {
  if (reminderInterval) clearInterval(reminderInterval);
  reminderInterval = setInterval(() => {
    const now = new Date();
    const [h, m] = timeStr.split(":").map(Number);
    if (now.getHours() === h && now.getMinutes() === m && now.getSeconds() < 5) {
      if (Notification.permission === "granted") {
        new Notification(lang.notifyTitle, {
          body: lang.notifyBody,
          icon: document.querySelector("link[rel='apple-touch-icon']")?.href || ""
        });
      }
    }
  }, 3000);
}

async function requestAndSchedule(timeStr) {
  if (!("Notification" in window)) return false;
  if (Notification.permission === "denied") {
    alert(lang.notifyDenied);
    return false;
  }
  if (Notification.permission !== "granted") {
    const perm = await Notification.requestPermission();
    if (perm !== "granted") {
      alert(lang.notifyDenied);
      return false;
    }
  }
  setReminderTime(timeStr);
  scheduleReminder(timeStr);
  return true;
}

// ページ読み込み時に既存のリマインダーを復元
window.addEventListener("load", () => {
  const t = getReminderTime();
  if (t) scheduleReminder(t);
});

  saveBtn.textContent = lang.reminderSave;
  saveBtn.onclick = async () => {
    const ok = await requestAndSchedule(input.value);
    if (ok) renderReminderSection_refresh(wrap);
  };
  row.appendChild(saveBtn);
  const cancelBtn = document.createElement("button");
  cancelBtn.style.cssText = "background:transparent;border:none;color:rgba(255,255,255,0.35);cursor:pointer;font-size:13px;font-family:inherit;padding:8px;";
  cancelBtn.textContent = lang.reminderCancel;
  cancelBtn.onclick = () => renderReminderSection_refresh(wrap);
  row.appendChild(cancelBtn);
  wrap.appendChild(row);
}


// ---- INTRO ----
function renderIntro(div) {
  const txt = div.appendChild(document.createElement("div"));
  txt.className = "intro-text";
  txt.innerHTML = lang.introText.replace(/\n/g,"<br>") +
    `<br><br><span class='intro-note'>${lang.introNote}</span>`;
  // ゾーンカード（快晴が上）
  const zonesRev = Object.values(ZONES).slice().reverse();
  zonesRev.forEach((z,i) => {
    if (i===1) { const t=div.appendChild(document.createElement("div")); t.className="tipping"; t.textContent=lang.tipping; }
    const card = div.appendChild(document.createElement("div"));
    card.className = "zone-card";
    card.style.background = z.accent+"22"; card.style.border = `1px solid ${z.accent}55`;
    const zl = lang.zones[z.id];
    card.innerHTML = `<span style='font-size:22px'>${z.emoji}</span><div>
      <div class='zone-card-name' style='color:${z.text}'>${zl.name}<span class='zone-card-range'> ${z.range[0]}–${z.range[1]}</span></div>
      <div class='zone-card-desc'>${zl.desc}</div></div>`;
  });
  const btn = div.appendChild(document.createElement("button"));
  btn.className="nb"; btn.style.marginTop="28px";
  btn.textContent = lang.startBtn;
  btn.onclick = () => setState({step:"select"});
  // リマインダー
  renderReminderSection(div);
}

// ---- SELECT ----
function renderSelect(div) {
  const hint = div.appendChild(document.createElement("div"));
  hint.className="select-hint";
  hint.innerHTML = `${lang.selectHint}<br><span>${lang.selectHint2}</span>`;
  const emotions = lang.emotions; // 1が先頭
  emotions.forEach(e => {
    if (e.n===8) { const t=div.appendChild(document.createElement("div")); t.className="tipping"; t.style.padding="10px 0"; t.textContent=lang.tipping; }
    const z = getZone(e.n);
    const btn = div.appendChild(document.createElement("button"));
    btn.className="emo-btn"; btn.style.borderLeft=`3px solid ${z.accent}77`;
    btn.innerHTML = `<span class='emo-num'>${e.n}</span><span>${e.label}</span>`;
    btn.onclick = () => {
      const zone = getZone(e.n);
      const emos = lang.emotions;
      const idx  = emos.findIndex(x=>x.n===e.n);
      const goalEmo = idx>0 ? emos[idx-1] : emos[0];
      const goalLabel = `${goalEmo.n}番　${goalEmo.label}`;
      const nLabel = e.label;
      setState({ n:e.n, zone, goalN:goalEmo.n, goalLabel, msgs:lang.getMsgs(e.n, goalLabel, nLabel), mi:0, step:"session" });
    };
  });
}

// ---- SESSION ----
function renderSession(div) {
  const z = state.zone;
  const msgBox = div.appendChild(document.createElement("div"));
  msgBox.className="msg-box"; msgBox.style.color=z.text;
  const btnRow = div.appendChild(document.createElement("div"));
  btnRow.className="btn-row";
  const isLast     = state.mi >= state.msgs.length-1;
  const isStorm    = z.id==="storm";
  const isStormBreath = isStorm && isLast; // 嵐の最後＝呼吸誘導画面
  const isEnd1     = state.n===1;

  typewrite(msgBox, state.msgs[state.mi], 28, () => {
    // 戻るボタン
    if (state.mi > 0) {
      const bk = document.createElement("button");
      bk.className="nb-back"; bk.textContent=lang.backBtn;
      bk.onclick = () => { state.mi--; state.history.pop(); setState({}); };
      btnRow.appendChild(bk);
    }

    if (isStormBreath) {
      // 嵐ゾーン最後：呼吸ボタン＋スキップ
      const nx = document.createElement("button");
      nx.className="nb"; nx.textContent=lang.breathBtn;
      nx.onclick = () => setState({step:"breath"});
      btnRow.appendChild(nx);
      const sk = document.createElement("button");
      sk.className="nb-ghost"; sk.textContent=lang.skipBtn;
      sk.onclick = () => setState({step:"done"});
      btnRow.appendChild(sk);
    } else if (isLast && isEnd1) {
      const nx = document.createElement("button");
      nx.className="nb"; nx.textContent=lang.endBtn;
      nx.onclick = () => setState({step:"done"});
      btnRow.appendChild(nx);
    } else if (isLast) {
      const nx = document.createElement("button");
      nx.className="nb"; nx.textContent=lang.breathBtn;
      nx.onclick = () => setState({step:"breath"});
      btnRow.appendChild(nx);
    } else {
      const nx = document.createElement("button");
      nx.className="nb"; nx.textContent=lang.continueBtn;
      nx.onclick = () => setState({mi:state.mi+1});
      btnRow.appendChild(nx);
    }
  });
}

// ---- BREATH ----
function renderBreath(div, seconds, nextStep) {
  const z = state.zone;
  const lbl = div.appendChild(document.createElement("div"));
  lbl.className="breath-label";
  lbl.innerHTML = seconds===30
    ? `${lang.breath30label}<br><span>${lang.breath30sub}</span>`
    : lang.breath60label;
  const wrap = div.appendChild(document.createElement("div"));
  wrap.className="breath-wrap";
  wrap.innerHTML = `<div class='breath-circle' id='breath-circle'></div><div class='breath-timer' id='breath-timer'></div>`;
  if (seconds===30) {
    const hint = div.appendChild(document.createElement("div"));
    hint.className="breath-hint"; hint.textContent=lang.breathHint;
  }
  // 戻るボタン
  const bkRow = div.appendChild(document.createElement("div"));
  bkRow.className="center";
  const bk = document.createElement("button");
  bk.className="nb-back"; bk.textContent=lang.backBtn; bk.style.marginTop="20px";
  bk.onclick = goBack;
  bkRow.appendChild(bk);
  // 音選択
  renderSoundSelector(div);
  setTimeout(()=>startBreath(z, seconds, ()=>setState({step:nextStep})), 60);
}

// ---- AFTER BREATH ----
function renderAfterBreath(div) {
  const z = state.zone;
  const msgBox = div.appendChild(document.createElement("div"));
  msgBox.className="msg-box"; msgBox.style.color=z.text;
  const btnRow = div.appendChild(document.createElement("div"));
  btnRow.className="btn-row";
  const isStorm = z.id==="storm";
  const isSunny = z.id==="sunny";
  const text = isStorm ? lang.afterBreathStorm : (isSunny ? lang.afterBreathSunny : lang.afterBreathOther);
  typewrite(msgBox, text, 26, () => {
    const bk = document.createElement("button");
    bk.className="nb-back"; bk.textContent=lang.backBtn;
    bk.onclick = goBack;
    btnRow.appendChild(bk);
    const nx = document.createElement("button");
    nx.className="nb"; nx.textContent=isStorm ? lang.breathBtn : lang.breathAgainBtn;
    nx.onclick = () => setState({step: isStorm ? "breathstorm" : "breath2"});
    btnRow.appendChild(nx);
    if (isStorm) {
      const sk = document.createElement("button");
      sk.className="nb-ghost"; sk.textContent=lang.skipBtn;
      sk.onclick = () => setState({step:"done"});
      btnRow.appendChild(sk);
    }
  });
}

// ---- BREATH STORM (吐くだけ 90秒) ----
function renderBreathStorm(div) {
  const z = state.zone;

  // ラベル（他ゾーンと同じ構造）
  const lbl = div.appendChild(document.createElement("div"));
  lbl.className="breath-label";
  lbl.textContent = lang.breath30label; // 「呼吸を観察してください。」の位置に使う

  // 円＋タイマー（他ゾーンと全く同じ構造）
  const wrap = div.appendChild(document.createElement("div"));
  wrap.className="breath-wrap";
  wrap.innerHTML = `<div class='breath-circle' id='breath-circle'></div><div class='breath-timer' id='breath-timer'></div>`;

  // 戻るボタン
  const bkRow = div.appendChild(document.createElement("div"));
  bkRow.className="center";
  const bk = document.createElement("button");
  bk.className="nb-back"; bk.textContent=lang.backBtn; bk.style.marginTop="20px";
  bk.onclick = goBack;
  bkRow.appendChild(bk);

  // 音選択
  renderSoundSelector(div);

  // 吐くだけアニメーション開始
  setTimeout(() => {
    const circle = document.getElementById("breath-circle");
    const timer  = document.getElementById("breath-timer");
    if (!circle || !timer) return;

    // 円のスタイル（嵐ゾーンカラー）
    circle.style.background = `radial-gradient(circle,${z.glow}28 0%,transparent 70%)`;
    circle.style.border = `1.5px solid ${z.glow}77`;
    circle.style.color  = `${z.glow}ee`;

    // 吐くだけ：常に縮む方向にアニメーション
    // 8秒かけてゆっくり縮む → また縮むを繰り返す
    let shrinking = true;
    function animateExhale() {
      circle.style.transition = `transform 8000ms cubic-bezier(0.4,0,0.6,1)`;
      circle.style.transform  = shrinking ? "scale(0.72)" : "scale(1.05)";
      circle.textContent = lang.exhaleLabel;
      shrinking = !shrinking;
    }
    animateExhale();
    const animInterval = setInterval(animateExhale, 8000);
    state.breathInterval = { clear: () => clearInterval(animInterval) };

    // 90秒カウントダウン
    let left = 90;
    timer.textContent = `${left}s`;
    if (state.countInterval) clearInterval(state.countInterval);
    const ci = setInterval(() => {
      playTick();
      left--;
      timer.textContent = left > 0 ? `${left}s` : "✓";
      if (left <= 0) {
        clearInterval(ci);
        state.breathInterval?.clear();
        setState({step:"done"});
      }
    }, 1000);
    state.countInterval = ci;
  }, 60);
}

// ---- DONE ----
function renderDone(div) {
  const z = state.zone; const n = state.n; const gl = state.goalLabel;
  const msgBox = div.appendChild(document.createElement("div"));
  msgBox.className="msg-box"; msgBox.style.color=z.text; msgBox.style.textAlign="center";
  const btns = div.appendChild(document.createElement("div"));
  btns.className="done-btns";
  let text;
  if (z.id==="storm")       text = lang.doneStorm;
  else if (n===1)           text = lang.done1;
  else if (z.id==="sunny")  text = lang.doneSunny(gl);
  else                      text = lang.doneOther(gl);
  typewrite(msgBox, text, 26, () => {
    const orn = document.createElement("div"); orn.className="done-ornament"; orn.textContent="— 🦋 —";
    btns.appendChild(orn);
    const b1 = document.createElement("button"); b1.className="nb"; b1.textContent=lang.restartBtn;
    b1.onclick = ()=>setState({step:"intro",n:null,zone:null,goalN:null,goalLabel:null,msgs:[],mi:0,history:[]});
    btns.appendChild(b1);
    const b2 = document.createElement("button"); b2.className="nb-ghost"; b2.textContent=lang.recheckBtn;
    b2.onclick = ()=>setState({step:"select",history:[]});
    btns.appendChild(b2);
  });
}

window.addEventListener("load", () => { generateButterflyIcon(); render(); });
</script>
